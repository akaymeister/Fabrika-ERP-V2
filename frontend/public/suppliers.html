<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="suppliers.title">Tedarikçiler</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3">
  <div class="container pur-wide app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left">
        <h1 class="app-page-title" data-i18n="suppliers.title">Tedarikçiler</h1>
        <p class="subtitle" data-i18n="suppliers.sub">Tedarikçi listesi, yeni tedarikçi ekleme. Sipariş işleme ekranında bu liste kullanılır.</p>
      </div>
        <div class="topbar-right">
        <select id="languageSelect" class="app-select app-topbar-lang" aria-label="Language">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/purchasing.html" class="version-btn" data-i18n="nav.purch.hub">Satınalma</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">

    <p id="msg" class="purch-msg-api" role="status"></p>

    <section class="card app-card">
      <h3 class="app-card-title" data-i18n="suppliers.addH">Yeni tedarikçi</h3>
      <div class="sup-form">
        <div><input id="sName" class="app-input" maxlength="191" placeholder="" data-i18n-placeholder="suppliers.name" /></div>
        <div><input id="sPhone" class="app-input" maxlength="64" placeholder="" data-i18n-placeholder="suppliers.phone" /></div>
        <div><input id="sEmail" class="app-input" maxlength="191" placeholder="" data-i18n-placeholder="suppliers.email" /></div>
        <div><input id="sTax" class="app-input" maxlength="64" placeholder="" data-i18n-placeholder="suppliers.tax" /></div>
        <div class="full"><input id="sAddress" class="app-input" maxlength="500" placeholder="" data-i18n-placeholder="suppliers.address" /></div>
        <div class="full"><textarea id="sNote" class="app-input app-textarea" rows="2" placeholder="" data-i18n-placeholder="suppliers.note"></textarea></div>
      </div>
      <p class="sup-actions-bar">
        <button type="button" class="logout-btn app-button app-button-primary" id="btnAdd" data-i18n="suppliers.btnAdd">Tedarikçi ekle</button>
      </p>
      <p class="sup-muted" data-i18n="suppliers.futureNote">İleride: cari hesap, borç/alacak, bakiye ekranları bu modül altında açılacak.</p>
    </section>

    <section class="card app-card sup-list-card">
      <h3 class="app-card-title" data-i18n="suppliers.listH">Tedarikçi listesi</h3>
      <div class="sup-filter">
        <input id="q" class="app-input" placeholder="" data-i18n-placeholder="suppliers.filterPh" />
      </div>
      <div class="app-table-scroll">
        <table class="sup-list app-table">
          <thead>
            <tr>
              <th data-i18n="suppliers.colName">Ad</th>
              <th data-i18n="suppliers.colPhone">Telefon</th>
              <th data-i18n="suppliers.colEmail">E-posta</th>
              <th data-i18n="suppliers.colTax">Vergi no</th>
              <th data-i18n="suppliers.colAddress">Adres</th>
              <th data-i18n="suppliers.colNote">Not</th>
            </tr>
          </thead>
          <tbody id="tb"><tr><td colspan="6" data-i18n="purch.req.loading">Yükleniyor…</td></tr></tbody>
        </table>
      </div>
    </section>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js?v=14" defer></script>
  <script src="/js/navigation.js?v=1" defer></script>
  <script src="/js/purchasing-common.js?v=14" defer></script>
  <script>
    (function () {
      const msg = document.getElementById('msg');
      const tb = document.getElementById('tb');
      const q = document.getElementById('q');
      let all = [];
      function tK(k) { return (window.i18n && window.i18n.t) ? window.i18n.t(k) : k; }
      function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
      function showMsg(t, err) { if (!msg) return; msg.textContent = t; msg.style.color = err ? '#b91c1c' : '#0f766e'; }
      function render() {
        const f = String(q.value || '').trim().toLowerCase();
        const rows = !f ? all : all.filter((r) => (
          String(r.name || '').toLowerCase().includes(f) ||
          String(r.phone || '').toLowerCase().includes(f) ||
          String(r.email || '').toLowerCase().includes(f) ||
          String(r.tax_number || '').toLowerCase().includes(f)
        ));
        if (!rows.length) { tb.innerHTML = '<tr><td colspan="6">—</td></tr>'; return; }
        tb.innerHTML = rows.map((r) => `<tr>
          <td>${esc(r.name || '')}</td>
          <td>${esc(r.phone || '—')}</td>
          <td>${esc(r.email || '—')}</td>
          <td>${esc(r.tax_number || '—')}</td>
          <td>${esc(r.address || '—')}</td>
          <td>${esc(r.note || '—')}</td>
        </tr>`).join('');
      }
      async function load() {
        const { ok, data } = await window.purApi('/api/purchasing/suppliers');
        if (!ok || !data || !data.ok) { tb.innerHTML = '<tr><td colspan="6">—</td></tr>'; return; }
        all = data.suppliers || [];
        render();
      }
      async function add() {
        const body = {
          name: document.getElementById('sName').value,
          phone: document.getElementById('sPhone').value,
          email: document.getElementById('sEmail').value,
          tax_number: document.getElementById('sTax').value,
          address: document.getElementById('sAddress').value,
          note: document.getElementById('sNote').value,
        };
        if (!body.name || !body.name.trim()) { showMsg(tK('suppliers.errName'), true); return; }
        const { ok, data } = await window.purApi('/api/purchasing/suppliers', {
          method: 'POST', body: JSON.stringify(body),
        });
        if (!ok) { showMsg((data && (data.message || data.messageKey)) || tK('api.error.unknown'), true); return; }
        showMsg(tK('suppliers.okAdded'));
        ['sName','sPhone','sEmail','sTax','sAddress','sNote'].forEach((id) => { const el = document.getElementById(id); if (el) el.value = ''; });
        load();
      }
      document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => {
          location.href = '/login.html';
        });
      });
      document.getElementById('btnAdd').addEventListener('click', add);
      q.addEventListener('input', render);

      /* defer scriptler (i18n, navigation, purchasing-common) DOMContentLoaded öncesinde çalışır;
         inline script sırası yüzünden burada purApi / initPurchasingPageNav henüz yoktu. */
      document.addEventListener('DOMContentLoaded', async () => {
        try {
          if (typeof window.initPurchasingPageNav === 'function') {
            await window.initPurchasingPageNav('suppliers');
          }
          await load();
          if (window.i18n && window.i18n.apply) window.i18n.apply(document);
        } catch (err) {
          console.error(err);
          if (msg) {
            msg.textContent = err && err.message ? err.message : String(err);
            msg.style.color = '#b91c1c';
          }
        }
      });
    })();
  </script>
</body>
</html>
