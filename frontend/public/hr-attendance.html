<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="hr.att.daily.title">Gunluk puantaj</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .att-scroll { overflow-x: hidden; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; }
    .att-table { width: 100%; table-layout: fixed; }
    .att-table th, .att-table td { font-size: var(--font-size-ui); padding: 6px 8px; vertical-align: middle; }
    .att-table select, .att-table input { min-height: 36px; font-size: 11px; }
    .att-table th, .att-table td { white-space: normal; word-break: break-word; }
    .att-table .att-input-col { width: 86px; min-width: 86px; max-width: 86px; }
    .att-table .att-input-col .pur-inp { width: 100%; min-width: 0; }
    .att-emp-code { display:block; margin-top:2px; font-size:11px; color:#94a3b8; font-weight:500; }
    .att-day-type { display:block; margin-top:2px; font-size:11px; color:#64748b; font-weight:600; }
    .att-actions-col { width: 78px; min-width: 78px; max-width: 78px; }
    .att-mini-actions { display:flex; align-items:center; justify-content:center; gap:6px; }
    .att-mini-btn {
      width: 26px;
      height: 26px;
      min-width: 26px;
      padding: 0;
      border-radius: 7px;
      border: 1px solid #dbe4f0;
      background: #f8fafc;
      color: #1f2937;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .att-mini-btn.has-note {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }
    .att-table th:nth-child(1), .att-table td:nth-child(1) { width: 16%; }
    .att-table th:nth-child(2), .att-table td:nth-child(2) { width: 11%; }
    .att-table th:nth-child(3), .att-table td:nth-child(3) { width: 10%; }
    .att-table th:nth-child(4), .att-table td:nth-child(4) { width: 10%; }
    .att-table th:nth-child(5), .att-table td:nth-child(5) { width: 9%; }
    .att-table th:nth-child(6), .att-table td:nth-child(6) { width: 9%; }
    .att-table th:nth-child(7), .att-table td:nth-child(7) { width: 8%; }
    .att-table th:nth-child(8), .att-table td:nth-child(8) { width: 8%; }
    .att-table th:nth-child(9), .att-table td:nth-child(9) { width: 10%; }
    .att-row-locked { opacity: 0.7; background: #f8fafc; }
    .att-inline-5 { display:grid; grid-template-columns: 1.1fr 1.1fr 1.5fr auto auto; gap:10px; align-items:end; }
    .att-inline-5 > * { width:100%; min-width:0; }
    .att-inline-5 > button { height:34px; width:auto; min-width:90px; justify-self:end; font-size:var(--font-size-ui); border-radius:8px; }
    .att-date-row { display:flex; gap:12px; flex-wrap:wrap; align-items:end; justify-content:space-between; }
    .att-missing-badge { font-size:var(--font-size-meta); color:#475569; background:#f8fafc; border:1px solid #e2e8f0; border-radius:999px; padding:6px 10px; }
    .att-sunday-override { margin-top:10px; border:1px dashed #cbd5e1; border-radius:8px; padding:8px 10px; display:none; }
    .att-sunday-override.open { display:block; }
    .att-sunday-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .att-edit-reason-banner { margin-top:10px; padding:10px 12px; background:#fffbeb; border:1px solid #fcd34d; border-radius:8px; font-size:var(--font-size-meta); display:none; }
    .att-edit-reason-banner.open { display:block; }
    .att-edit-reason-banner strong { display:block; margin-bottom:6px; color:#92400e; }
    .att-edit-reason-banner .att-edit-reason-body { color:#451a03; white-space:pre-wrap; word-break:break-word; }
    @media (max-width: 980px) { .att-inline-5 { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="app-shell app-master-page">
  <div class="container">
    <div class="topbar dashboard-topbar">
      <div class="app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>

      <div class="topbar-left">
        <h1 data-i18n="hr.att.daily.title">Gunluk puantaj</h1>
        <p class="subtitle" data-i18n="hr.att.daily.sub">Aktif personeller icin toplu gunluk giris</p>
      </div>
      <div class="topbar-right">
        <select id="languageSelect" data-i18n-placeholder="lang.label" style="max-width:120px;padding:8px;border-radius:8px" aria-label="Language">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/hr.html" class="version-btn" data-i18n="nav.hr.hub">IK</a>
</div>
    </div>
    <div id="globalNavSlot"></div>
    <div class="app-master-body">
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
      <main class="app-master-main">

    <section class="card">
      <div class="form-row att-date-row">
        <div>
          <label for="workDate" data-i18n="hr.att.daily.date">Tarih</label>
          <input id="workDate" type="date" />
        </div>
        <p id="missingCount" class="att-missing-badge" data-i18n="hr.att.daily.missingCount">Giriş yapılmayan personel: 0</p>
      </div>
      <div id="editReasonBanner" class="att-edit-reason-banner" role="status">
        <strong data-i18n="hr.att.daily.editReasonBanner">Düzenleme açıklaması</strong>
        <div id="editReasonText" class="att-edit-reason-body"></div>
      </div>
      <div id="sundayOverrideBox" class="att-sunday-override">
        <div class="att-sunday-row">
          <button type="button" id="btnSundayOpen" class="version-btn" data-i18n="hr.att.sunday.open">Pazar çalışmasını aç</button>
          <button type="button" id="btnSundayClose" class="logout-btn" data-i18n="hr.att.sunday.close">Pazar çalışmasını kapat</button>
          <label style="display:flex;align-items:center;gap:6px">
            <input id="chkSundayPaidDaily" type="checkbox" />
            <span data-i18n="hr.att.sunday.paid">Pazar günü ücretli</span>
          </label>
        </div>
      </div>
      <p class="muted" style="margin-top:10px" data-i18n="hr.emp.filtersTitle">Filtreler</p>
      <div class="att-inline-5" style="margin-top:6px">
        <select id="attNatFilter" aria-label="nat">
          <option value="" data-i18n="hr.emp.filterNat">Uyruk</option>
          <option value="TR" data-i18n="hr.emp.nat.TR">TR</option>
          <option value="UZ" data-i18n="hr.emp.nat.UZ">UZ</option>
          <option value="RU" data-i18n="hr.emp.nat.RU">RU</option>
          <option value="EN" data-i18n="hr.emp.nat.EN">EN</option>
          <option value="OTHER" data-i18n="hr.emp.nat.OTHER">Diğer</option>
        </select>
        <select id="attDepFilter" aria-label="dept"><option value="" data-i18n="hr.emp.filterDept">Departman</option></select>
        <input id="attNameFilter" type="text" data-i18n-placeholder="hr.emp.search" placeholder="İsim ara" />
        <button type="button" id="btnLoadDaily" class="version-btn" data-i18n="hr.att.daily.load">Listele</button>
        <button type="button" id="btnSaveDaily" class="version-btn" data-i18n="hr.att.daily.save">Kaydet</button>
      </div>
      <p id="lockHint" class="text-dense" style="margin-top:8px;color:#b91c1c;display:none" data-i18n="hr.att.locked.hint">Bu ay kilitli</p>
      <p id="msg" class="api-msg" style="min-height:1.2em;margin-top:8px"></p>
      <div class="att-scroll" style="margin-top:12px">
        <table class="att-table">
          <thead>
            <tr>
              <th data-i18n="hr.att.colEmployee">Personel</th>
              <th data-i18n="hr.att.colProject">Proje</th>
              <th data-i18n="hr.att.colStatus">Durum</th>
              <th data-i18n="hr.att.colWorkType">Is tipi</th>
              <th data-i18n="hr.att.colCheckIn">Giris</th>
              <th data-i18n="hr.att.colCheckOut">Cikis</th>
              <th data-i18n="hr.att.colTotalHours">Toplam saat</th>
              <th data-i18n="hr.att.colOvertimeHours">Fazla mesai</th>
              <th data-i18n="hr.emp.colAction">İşlem</th>
            </tr>
          </thead>
          <tbody id="dailyBody"><tr><td colspan="9" data-i18n="hr.att.loading">Yukleniyor…</td></tr></tbody>
        </table>
      </div>
    </section>
      </main>
    </div>
  </div>

  <script src="/js/i18n.js" defer></script>
  <script src="/js/ui-notify.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/hr-common.js" defer></script>
  <script src="/js/hr-attendance.js" defer></script>
  <script>
    function startHrAttendancePage() {
      (async function () {
        if (window.i18n && window.i18n.loadDict) await window.i18n.loadDict(window.i18n.getLang());
        await window.initGlobalNavigation?.('hr');
        await window.initHrPageNav?.('attendance-daily');
        await window.initHrAttendancePage?.();
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startHrAttendancePage);
    } else {
      startHrAttendancePage();
    }
  </script>
</body>
</html>
