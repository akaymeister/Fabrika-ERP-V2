<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="hr.att.daily.title">Gunluk puantaj</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
        <h1 class="app-page-title" data-i18n="hr.att.daily.title">Gunluk puantaj</h1>
        <p class="subtitle" data-i18n="hr.att.daily.sub">Aktif personeller icin toplu gunluk giris</p>
      </div>
        <div class="topbar-right app-toolbar-right">
        <select id="languageSelect" data-i18n-placeholder="lang.label" class="app-select app-topbar-lang" aria-label="Language">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/hr.html" class="version-btn app-button app-button-secondary" data-i18n="nav.hr.hub">IK</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">


    <section class="card app-card">
      <div class="form-row att-date-row">
        <div>
          <label for="workDate" data-i18n="hr.att.daily.date">Tarih</label>
          <input id="workDate" type="date" class="app-input" />
        </div>
        <p id="missingCount" class="att-missing-badge" data-i18n="hr.att.daily.missingCount">Giriş yapılmayan personel: 0</p>
      </div>
      <div id="editReasonBanner" class="att-edit-reason-banner" role="status">
        <strong data-i18n="hr.att.daily.editReasonBanner">Düzenleme açıklaması</strong>
        <div id="editReasonText" class="att-edit-reason-body"></div>
      </div>
      <div id="sundayOverrideBox" class="att-sunday-override">
        <div class="att-sunday-row">
          <button type="button" id="btnSundayOpen" class="version-btn" data-i18n="hr.att.sunday.open">Pazar çalışmasını aç</button>
          <button type="button" id="btnSundayClose" class="logout-btn app-button app-button-danger" data-i18n="hr.att.sunday.close">Pazar çalışmasını kapat</button>
          <label class="att-sunday-label">
            <input id="chkSundayPaidDaily" type="checkbox" />
            <span data-i18n="hr.att.sunday.paid">Pazar günü ücretli</span>
          </label>
        </div>
      </div>
      <p class="muted att-filters-title" data-i18n="hr.emp.filtersTitle">Filtreler</p>
      <div class="app-page-toolbar att-toolbar-row">
      <div class="app-toolbar-left att-inline-5 att-filter-grid app-filterbar">
        <select id="attNatFilter" aria-label="nat" class="app-select">
          <option value="" data-i18n="hr.emp.filterNat">Uyruk</option>
          <option value="TR" data-i18n="hr.emp.nat.TR">TR</option>
          <option value="UZ" data-i18n="hr.emp.nat.UZ">UZ</option>
          <option value="RU" data-i18n="hr.emp.nat.RU">RU</option>
          <option value="EN" data-i18n="hr.emp.nat.EN">EN</option>
          <option value="OTHER" data-i18n="hr.emp.nat.OTHER">Diğer</option>
        </select>
        <select id="attDepFilter" aria-label="dept" class="app-select"><option value="" data-i18n="hr.emp.filterDept">Departman</option></select>
        <input id="attNameFilter" type="text" data-i18n-placeholder="hr.emp.search" placeholder="İsim ara" class="app-input" />
      </div>
      <div class="app-toolbar-right att-toolbar-save">
        <button type="button" id="btnLoadDaily" class="version-btn app-button app-button-secondary" data-i18n="hr.att.daily.load">Listele</button>
        <button type="button" id="btnSaveDaily" class="version-btn app-button app-button-primary" data-i18n="hr.att.daily.save">Kaydet</button>
      </div>
      </div>
      <p id="lockHint" class="text-dense att-lock-hint" data-i18n="hr.att.locked.hint">Bu ay kilitli</p>
      <p id="msg" class="api-msg app-msg-slot att-msg-line"></p>
      <div class="att-scroll att-table-wrap">
        <table class="att-table app-table">
          <thead>
            <tr>
              <th data-i18n="hr.att.colEmployee">Personel</th>
              <th data-i18n="hr.att.colProject">Proje</th>
              <th data-i18n="hr.att.colStatus">Durum</th>
              <th data-i18n="hr.att.colWorkType">Is tipi</th>
              <th data-i18n="hr.att.colCheckIn">Giris</th>
              <th data-i18n="hr.att.colCheckOut">Cikis</th>
              <th data-i18n="hr.att.colTotalHours">Toplam saat</th>
              <th data-i18n="hr.att.colOvertimeHours">Fazla mesai</th>
              <th class="app-table-col-action" data-i18n="hr.emp.colAction">İşlem</th>
            </tr>
          </thead>
          <tbody id="dailyBody"><tr><td colspan="9" data-i18n="hr.att.loading">Yukleniyor…</td></tr></tbody>
        </table>
      </div>
    </section>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/ui-notify.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/hr-common.js" defer></script>
  <script src="/js/hr-attendance.js" defer></script>
  <script>
    function startHrAttendancePage() {
      (async function () {
        if (window.i18n && window.i18n.loadDict) await window.i18n.loadDict(window.i18n.getLang());
        await window.initGlobalNavigation?.('hr');
        await window.initHrPageNav?.('attendance-daily');
        await window.initHrAttendancePage?.();
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startHrAttendancePage);
    } else {
      startHrAttendancePage();
    }
  </script>
</body>
</html>
