<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="purch.open.title">Satınalma siparişi aç</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3 erp-page pur-req-open-page">
  <div class="container pur-wide app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
        <h1 class="app-page-title" data-i18n="purch.open.title">Satınalma siparişi aç</h1>
        <p class="subtitle" data-i18n="purch.open.sub">Proje ve satırlar; taslak veya onaya gönderim</p>
      </div>
        <div class="topbar-right app-toolbar-right">
        <select id="languageSelect" data-i18n-placeholder="lang.label" class="app-select app-topbar-lang" aria-label="Language">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/purchasing.html" class="btn btn-secondary" data-i18n="nav.purch.hub">Satınalma</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">

    <p id="msg" class="api-msg purch-msg-api" role="status"></p>

    <section class="card app-card erp-card">
      <h3 class="app-card-title" data-i18n="purch.open.formH">Talep / sipariş satırları</h3>
      <div class="pur-req-top">
        <div>
          <label class="app-label" for="fProject" data-i18n="purch.req.project">Proje (aktif)</label>
          <select id="fProject" class="pur-inp app-select purch-project-select"></select>
        </div>
        <div>
          <label class="app-label" data-i18n="purch.req.nextCode">Sonraki talep no</label>
          <div id="codePreview" class="purch-code-preview">—</div>
        </div>
        <div class="purch-req-title-field">
          <label class="app-label" for="fTitle" data-i18n="purch.req.titleField">Başlık (isteğe bağlı)</label>
          <input id="fTitle" type="text" class="pur-inp app-input app-fill-block" />
        </div>
      </div>
      <div class="purch-req-note-block">
        <label class="app-label" for="fNote" data-i18n="purch.req.note">Genel not</label>
        <textarea id="fNote" rows="2" class="pur-inp app-input app-textarea app-fill-block"></textarea>
      </div>

      <div class="pur-line-scroll">
        <table class="pur-line-table app-table">
          <thead>
            <tr>
              <th data-i18n="purch.req.colWh">Depo</th>
              <th data-i18n="purch.req.colSub">Alt kategori</th>
              <th data-i18n="purch.req.colProd">Ürün</th>
              <th data-i18n="purch.col.stockOnHand">Mevcut stok</th>
              <th data-i18n="purch.req.colQty">Miktar</th>
              <th data-i18n="purch.req.colUnit">Birim</th>
              <th data-i18n="purch.req.colImg">Görsel</th>
              <th data-i18n="purch.req.colPdf">PDF</th>
              <th data-i18n="purch.req.colLineNote">Satır notu</th>
              <th data-i18n="purch.req.colCopy">Kopya</th>
            </tr>
          </thead>
          <tbody id="linesBody"></tbody>
        </table>
      </div>
      <div class="pur-req-btns">
        <div class="pur-req-btns-row" role="group" aria-label="Talep eylemleri">
          <button type="button" id="addLine" class="btn btn-secondary" data-i18n="purch.req.addLine">Satır ekle</button>
          <button type="button" id="submitReq" class="btn btn-primary" data-i18n="purch.req.submit">Talep oluştur</button>
          <button type="button" id="saveDraft" class="btn btn-secondary" data-i18n="purch.req.saveDraft">Taslak kaydet</button>
        </div>
      </div>
    </section>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/stock-common.js" defer></script>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/purchasing-common.js" defer></script>
  <script src="/js/purchase-requisition-open.js" defer></script>
</body>
</html>
