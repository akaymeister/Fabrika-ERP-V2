<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="purch.open.title">Satınalma siparişi aç</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .pur-req-top { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 12px; margin-bottom: 16px; }
    .pur-req-top label { display: block; font-size: 13px; color: #475569; margin-bottom: 4px; }
    /* Tablo geniş: kaydırma sadece bu kutuda; kart genişliğini zorlamasın (min-width:0) */
    .pur-line-scroll {
      max-width: 100%;
      min-width: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .pur-line-table { min-width: 1280px; width: 100%; }
    .pur-line-table th, .pur-line-table td { font-size: 13px; vertical-align: middle; padding: 8px 10px; }
    .pur-line-table th { white-space: nowrap; background: #f8fafc; }
    .pur-line-table .r-wh { min-width: 140px; }
    .pur-line-table .r-sc { min-width: 130px; }
    .pur-line-table .r-pr { min-width: 280px; max-width: 400px; }
    .pur-line-table .r-stock-cell { min-width: 120px; max-width: 200px; }
    .pur-line-table .r-qty { min-width: 100px; }
    .pur-line-table .r-unit { min-width: 100px; }
    .pur-line-table .r-note { min-width: 180px; }
    .pur-inp { min-height: 40px; padding: 6px 10px; border-radius: 8px; border: 1px solid #e2e8f0; font: inherit; }
    select.pur-inp { min-height: 40px; }
    .pur-line-table .r-imgprev { max-height: 40px; max-width: 56px; object-fit: cover; border-radius: 4px; border: 1px solid #e2e8f0; }
    .r-stock { font-variant-numeric: tabular-nums; font-weight: 600; }
    .copy-row-btn { width: auto; padding: 6px 10px; font-size: 12px; }
    /* Global style.css tüm button { width:100% } — yan yana 3 butonu şişirip ekran taşır; burada sıfırla */
    .pur-req-btns {
      width: 100%;
      box-sizing: border-box;
      margin-top: 16px;
      text-align: right;
    }
    .pur-req-btns-row {
      display: inline-flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      gap: 10px;
      vertical-align: middle;
    }
    .pur-req-btns .version-btn, .pur-req-btns .logout-btn {
      width: auto;
      min-width: 0;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div class="container pur-wide">
    <div class="topbar dashboard-topbar">
      <div class="topbar-left">
        <h1 data-i18n="purch.open.title">Satınalma siparişi aç</h1>
        <p class="subtitle" data-i18n="purch.open.sub">Proje ve satırlar; taslak veya onaya gönderim</p>
      </div>
      <div class="topbar-right">
        <select id="languageSelect" data-i18n-placeholder="lang.label" style="max-width:120px;padding:8px;border-radius:8px" aria-label="Language">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a href="/purchasing.html" class="version-btn" data-i18n="nav.purch.hub">Satınalma</a>
        <a href="/" class="version-btn" data-i18n="nav.dashboard">Ana sayfa</a>
        <a href="#" class="logout-btn" id="logoutBtn" data-i18n="nav.logout">Çıkış</a>
      </div>
    </div>
    <div id="navSlot"></div>
    <p id="msg" class="api-msg" style="min-height:1.2em;margin:8px 0;color:#0f766e" role="status"></p>

    <section class="card">
      <h3 class="section-header" data-i18n="purch.open.formH">Talep / sipariş satırları</h3>
      <div class="pur-req-top">
        <div>
          <label for="fProject" data-i18n="purch.req.project">Proje (aktif)</label>
          <select id="fProject" class="pur-inp" style="min-width:260px"></select>
        </div>
        <div>
          <label data-i18n="purch.req.nextCode">Sonraki talep no</label>
          <div id="codePreview" style="font-weight:700;padding:10px 14px;background:#f1f5f9;border-radius:8px;min-width:130px">—</div>
        </div>
        <div style="flex:1;min-width:220px;max-width:420px">
          <label for="fTitle" data-i18n="purch.req.titleField">Başlık (isteğe bağlı)</label>
          <input id="fTitle" type="text" class="pur-inp" style="width:100%" />
        </div>
      </div>
      <div style="margin-bottom: 12px">
        <label for="fNote" data-i18n="purch.req.note">Genel not</label>
        <textarea id="fNote" rows="2" class="pur-inp" style="width:100%;max-width:900px"></textarea>
      </div>

      <div class="pur-line-scroll">
        <table class="pur-line-table">
          <thead>
            <tr>
              <th data-i18n="purch.req.colWh">Depo</th>
              <th data-i18n="purch.req.colSub">Alt kategori</th>
              <th data-i18n="purch.req.colProd">Ürün</th>
              <th data-i18n="purch.col.stockOnHand">Mevcut stok</th>
              <th data-i18n="purch.req.colQty">Miktar</th>
              <th data-i18n="purch.req.colUnit">Birim</th>
              <th data-i18n="purch.req.colImg">Görsel</th>
              <th data-i18n="purch.req.colPdf">PDF</th>
              <th data-i18n="purch.req.colLineNote">Satır notu</th>
              <th data-i18n="purch.req.colCopy">Kopya</th>
            </tr>
          </thead>
          <tbody id="linesBody"></tbody>
        </table>
      </div>
      <div class="pur-req-btns">
        <div class="pur-req-btns-row" role="group" aria-label="Talep eylemleri">
          <button type="button" id="addLine" class="version-btn" data-i18n="purch.req.addLine">Satır ekle</button>
          <button type="button" id="submitReq" class="logout-btn" style="background:#1d4ed8;border:none" data-i18n="purch.req.submit">Talep oluştur</button>
          <button type="button" id="saveDraft" class="version-btn" data-i18n="purch.req.saveDraft" style="background:#64748b;color:#fff;border:none">Taslak kaydet</button>
        </div>
      </div>
    </section>
  </div>
  <script src="/js/stock-common.js" defer></script>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/purchasing-common.js" defer></script>
  <script src="/js/purchase-requisition-open.js" defer></script>
</body>
</html>
