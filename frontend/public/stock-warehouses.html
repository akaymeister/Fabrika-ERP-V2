<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="stock.warehouse.title">Depolar</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left">
        <h1 class="app-page-title" data-i18n="stock.warehouse.title">Depolar</h1>
        <p class="subtitle" data-i18n="stock.warehouse.sub">Fiziksel depo (üst) ve alt kategoriler — ürün kaydında zorunlu</p>
      </div>
        <div class="topbar-right">
        <select id="languageSelect" aria-label="lang" class="app-select app-topbar-lang">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/stock.html" class="version-btn" data-i18n="nav.stock">Stok</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">


    <div class="wh-top-forms">
      <div class="card app-card">
        <h3 class="app-card-title" data-i18n="stock.warehouse.addWh">Yeni depo (ana kategori)</h3>
        <form id="fWh" class="filters wh-form-row">
          <div class="form-field wh-form-field-grow">
            <label class="app-label" for="newWh" data-i18n="stock.warehouse.whName">Depo adı</label>
            <input type="text" id="newWh" class="input-upper app-input" maxlength="120" data-i18n-placeholder="stock.warehouse.whNamePh" />
          </div>
          <button type="submit" class="module-button app-button app-button-primary" data-i18n="stock.warehouse.saveWh">Ekle</button>
        </form>
      </div>

      <div class="card app-card">
        <h3 class="app-card-title" data-i18n="stock.warehouse.addSub">Alt kategori ekle</h3>
        <form id="fSub" class="product-form-grid stock-wh-fsub-grid">
          <div class="form-field">
            <label class="app-label" for="subWh" data-i18n="stock.warehouse.toDepot">Depo</label>
            <select id="subWh" class="app-select" required></select>
          </div>
          <div class="form-field">
            <label class="app-label" for="newSub" data-i18n="stock.warehouse.subName">Alt kategori adı</label>
            <input type="text" id="newSub" class="input-upper app-input" maxlength="120" data-i18n-placeholder="stock.warehouse.subNamePh" />
          </div>
          <button type="submit" class="module-button app-button app-button-primary" data-i18n="stock.warehouse.saveSub">Ekle</button>
        </form>
      </div>
    </div>

    <div class="card app-card">
      <h3 class="app-card-title" data-i18n="stock.warehouse.list">Liste</h3>
      <div id="whList" class="wh-list-slot"></div>
    </div>
    <p id="pmsg" class="login-error stock-wh-pmsg"></p>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/stock-common.js" defer></script>
  <script>
    document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
      e.preventDefault();
      fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => {
        window.location.href = '/login.html';
      });
    });
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;');
    }
    function escAttr(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;');
    }
    function tW(key, fallback) {
      return window.i18n ? window.i18n.t(key) : fallback;
    }
    let whTree = [];
    function showErr(data) {
      const msg = document.getElementById('pmsg');
      msg.textContent = window.i18n?.apiErrorText ? window.i18n.apiErrorText(data) : (data && data.message) || 'Hata';
      msg.style.display = 'block';
    }
    function enterBlockEdit(block) {
      block.classList.add('wh-block--editing');
      block.querySelectorAll('.wh-main-inp, .wh-sub-inp').forEach((el) => {
        el.readOnly = false;
      });
      const main = block.querySelector('.wh-main-inp');
      if (main) {
        main.focus();
      }
      block.querySelector('.wh-block-btn-edit')?.setAttribute('hidden', '');
      block.querySelector('.wh-block-btn-save')?.removeAttribute('hidden');
    }
    async function loadAll() {
      const { data, ok } = await stockApi('/api/stock/warehouses');
      const msg = document.getElementById('pmsg');
      msg.style.display = 'none';
      if (!ok) {
        msg.textContent = window.i18n?.apiErrorText ? window.i18n.apiErrorText(data) : (data && data.message) || '—';
        msg.style.display = 'block';
        return;
      }
      whTree = data.warehouses || [];
      const subSel = document.getElementById('subWh');
      subSel.innerHTML = '<option value="">' + tW('stock.warehouse.selectWh', '—') + '</option>';
      whTree.forEach((w) => subSel.add(new Option(w.name, w.id)));
      const el = document.getElementById('whList');
      if (!whTree.length) {
        el.innerHTML = '<p class="wh-empty-msg">' + esc(tW('stock.warehouse.empty', '—')) + '</p>';
        return;
      }
      const te = tW('stock.warehouse.edit', 'Düzenle');
      const ts = tW('stock.warehouse.save', 'Kaydet');
      const td = tW('stock.warehouse.delete', 'Sil');
      const tdis = tW('stock.warehouse.subDeleteDisabledTitle', '');
      el.innerHTML = whTree
        .map(
          (w) =>
            `<div class="wh-main-block" data-wh-id="${w.id}">
            <div class="wh-main-line">
            <input type="text" class="wh-main-inp input-upper" maxlength="120" readonly value="${escAttr(w.name)}" data-initial="${escAttr(
            w.name
            )}" />
            </div>
            <p class="wh-main-meta"><code class="wh-sub-id">#${w.id}</code></p>
            <ul class="wh-sub-list">
            ${(w.subcategories || [])
              .map((s) => {
                const canDel = s.deletable === true;
                return (
                  '<li class="wh-sub-edit-row" data-wh-id="' +
                  w.id +
                  '" data-sub-id="' +
                  s.id +
                  '">' +
                  '<input type="text" class="wh-sub-inp input-upper" maxlength="120" readonly value="' +
                  escAttr(s.name) +
                  '" data-initial="' +
                  escAttr(s.name) +
                  '" />' +
                  '<div class="wh-sub-actions">' +
                  '<button type="button" class="secondary-btn btn-danger wh-sub-btn-del app-button app-button-danger" data-wh-id="' +
                  w.id +
                  '" data-sub-id="' +
                  s.id +
                  '"' +
                  (canDel ? '' : ' disabled') +
                  (canDel ? '' : ' title="' + escAttr(tdis) + '"') +
                  '>' +
                  esc(td) +
                  '</button>' +
                  '</div><code class="wh-sub-id">#' +
                  s.id +
                  (s.productCount > 0
                    ? ' Â· ' + tW('stock.warehouse.nProducts', 'Â· {n} ürün').replace('{n}', String(s.productCount))
                    : '') +
                  '</code></li>'
                );
              })
              .join('') || '<li>—</li>'}
            </ul>
            <div class="wh-block-footer">
            <button type="button" class="secondary-btn btn-edit wh-block-btn-edit app-button app-button-secondary">${esc(te)}</button>
            <button type="button" class="module-button wh-block-btn-save app-button app-button-primary" hidden>${esc(ts)}</button>
            </div>
            </div>`
        )
        .join('');
    }
    async function saveBlock(whBlock) {
      const wid = +String(whBlock.getAttribute('data-wh-id') || '0');
      if (wid < 1) {
        return;
      }
      const mainInp = whBlock.querySelector('.wh-main-inp');
      const mainName = mainInp ? toUpperTrClient(String(mainInp.value || '').trim()) : '';
      if (!mainName) {
        showErr({ messageKey: 'api.warehouse.name_required', message: 'Depo adı gerekli' });
        return;
      }
      const mainInit = toUpperTrClient((mainInp.getAttribute('data-initial') || '').trim());
      if (mainName !== mainInit) {
        const { data, ok } = await stockApi('/api/stock/warehouses/' + wid, {
          method: 'PATCH',
          body: JSON.stringify({ name: mainName }),
        });
        if (!ok) {
          showErr(data);
          return;
        }
      }
      for (const li of whBlock.querySelectorAll('li.wh-sub-edit-row')) {
        const inp = li.querySelector('.wh-sub-inp');
        const sid = +String(li.getAttribute('data-sub-id') || '0');
        if (!inp || sid < 1) {
          // eslint-disable-next-line no-continue
          continue;
        }
        const n = toUpperTrClient(String(inp.value || '').trim());
        if (!n) {
          showErr({ messageKey: 'api.warehouse.sub_name_required', message: 'Alt kategori adı gerekli' });
          return;
        }
        const init = toUpperTrClient((inp.getAttribute('data-initial') || '').trim());
        if (n === init) {
          // eslint-disable-next-line no-continue
          continue;
        }
        const { data, ok } = await stockApi('/api/stock/warehouses/' + wid + '/subcategories/' + sid, {
          method: 'PATCH',
          body: JSON.stringify({ name: n }),
        });
        if (!ok) {
          showErr(data);
          return;
        }
      }
      loadAll();
    }
    async function deleteSubcategory(warehouseId, subId) {
      const c = tW('stock.warehouse.confirmDeleteSub', 'Silmek istiyor musunuz?');
      if (!window.confirm(c)) {
        return;
      }
      const { data, ok } = await stockApi('/api/stock/warehouses/' + warehouseId + '/subcategories/' + subId, {
        method: 'DELETE',
      });
      if (!ok) {
        showErr(data);
        return;
      }
      loadAll();
    }
    document.getElementById('whList')?.addEventListener('click', (e) => {
      const t = e.target;
      if (!(t instanceof HTMLElement)) {
        return;
      }
      const whBlock = t.closest('.wh-main-block');
      if (whBlock && t.closest('.wh-block-btn-edit')) {
        e.preventDefault();
        enterBlockEdit(whBlock);
        return;
      }
      if (whBlock && t.closest('.wh-block-btn-save')) {
        e.preventDefault();
        saveBlock(whBlock);
        return;
      }
      const li = t.closest('li.wh-sub-edit-row');
      if (li && t.closest('.wh-sub-btn-del')) {
        e.preventDefault();
        const delBtn = t.closest('.wh-sub-btn-del');
        if (delBtn && delBtn.disabled) {
          return;
        }
        const wid = +li.getAttribute('data-wh-id');
        const sid = +li.getAttribute('data-sub-id');
        if (wid && sid) {
          deleteSubcategory(wid, sid);
        }
      }
    });
    document.getElementById('whList')?.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') {
        return;
      }
      const t = e.target;
      if (!t || !t.classList) {
        return;
      }
      if (!t.classList.contains('wh-main-inp') && !t.classList.contains('wh-sub-inp')) {
        return;
      }
      if (t.readOnly) {
        return;
      }
      e.preventDefault();
      const whBlock = t.closest('.wh-main-block');
      if (whBlock && whBlock.classList.contains('wh-block--editing')) {
        saveBlock(whBlock);
      }
    });
    document.getElementById('fWh')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const n = toUpperTrClient(document.getElementById('newWh').value.trim());
      if (!n) {
        return;
      }
      const { data, ok } = await stockApi('/api/stock/warehouses', { method: 'POST', body: JSON.stringify({ name: n }) });
      const msg = document.getElementById('pmsg');
      if (!ok) {
        msg.textContent = window.i18n?.apiErrorText ? window.i18n.apiErrorText(data) : 'Hata';
        msg.style.display = 'block';
        return;
      }
      document.getElementById('newWh').value = '';
      loadAll();
    });
    document.getElementById('fSub')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const wid = +document.getElementById('subWh').value;
      const n = toUpperTrClient(document.getElementById('newSub').value.trim());
      if (!wid || !n) {
        return;
      }
      const { data, ok } = await stockApi('/api/stock/warehouses/' + wid + '/subcategories', {
        method: 'POST',
        body: JSON.stringify({ name: n }),
      });
      const msg = document.getElementById('pmsg');
      if (!ok) {
        msg.textContent = window.i18n?.apiErrorText ? window.i18n.apiErrorText(data) : 'Hata';
        msg.style.display = 'block';
        return;
      }
      document.getElementById('newSub').value = '';
      loadAll();
    });
    function startStockWarehousesPage() {
      (async () => {
        await initStockPageNav('warehouses');
        await loadAll();
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startStockWarehousesPage);
    } else {
      startStockWarehousesPage();
    }
  </script>
</body>
</html>
