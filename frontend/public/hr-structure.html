<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="hr.structure.pageTitle">Departmanlar / Pozisyonlar</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3 erp-page hr-structure-page">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
        <h1 class="app-page-title" data-i18n="hr.structure.pageTitle">Departmanlar / Pozisyonlar</h1>
        <p class="subtitle" data-i18n="hr.structure.pageSub">İK yapısı</p>
      </div>
        <div class="topbar-right app-toolbar-right">
        <select id="languageSelect" aria-label="Language" class="app-select app-topbar-lang">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/hr.html" class="btn btn-secondary" data-i18n="nav.hr.hub">IK</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">

    <div id="msg" class="muted app-muted-text hr-structure-msg"></div>

    <div class="hr-structure-grid">
      <section class="card app-card erp-card hr-structure-panel">
        <h2 class="app-card-title erp-card-header" data-i18n="hr.structure.blockDeps">Departmanlar</h2>
        <form id="depForm" class="erp-form">
          <div class="inline-group">
            <input id="depName" class="input-upper app-input" data-i18n-placeholder="hr.structure.depNamePlaceholder" placeholder="Departman adı" required />
            <input id="depCode" class="input-upper app-input" data-i18n-placeholder="hr.structure.depCodePlaceholder" placeholder="Kod (isteğe bağlı)" />
          </div>
          <div class="hr-st-form-footer erp-form-actions">
            <button type="submit" id="depSubmitBtn" class="btn btn-sm btn-icon hr-st-icon-btn hr-st-submit" aria-label="">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
          </div>
        </form>
        <div class="hr-structure-inner erp-card-body">
          <div class="hr-structure-table-wrap erp-table-wrap">
          <table class="app-table erp-table erp-table-compact">
            <thead><tr>
              <th data-i18n="hr.structure.colName">Ad</th>
              <th data-i18n="hr.structure.colCode">Kod</th>
              <th data-i18n="hr.emp.colStatus">Durum</th>
              <th data-i18n="hr.emp.colAction">İşlem</th>
            </tr></thead>
            <tbody id="depBody"><tr><td colspan="4" data-i18n="hr.att.loading">Yükleniyor…</td></tr></tbody>
          </table>
          </div>
        </div>
      </section>

      <section class="card app-card erp-card hr-structure-panel">
        <h2 class="app-card-title erp-card-header" data-i18n="hr.structure.blockPos">Pozisyonlar</h2>
        <form id="posForm" class="erp-form">
          <select id="posDepartment" class="app-select" required></select>
          <div class="inline-group">
            <input id="posName" class="input-upper app-input" data-i18n-placeholder="hr.structure.posNamePlaceholder" placeholder="Pozisyon adı" required />
            <input id="posCode" class="input-upper app-input" data-i18n-placeholder="hr.structure.posCodePlaceholder" placeholder="Kod (isteğe bağlı)" />
          </div>
          <div class="hr-st-form-footer erp-form-actions">
            <button type="submit" id="posSubmitBtn" class="btn btn-sm btn-icon hr-st-icon-btn hr-st-submit" aria-label="">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
          </div>
        </form>
        <div class="hr-structure-inner erp-card-body">
          <div class="hr-structure-table-wrap erp-table-wrap">
          <table class="app-table erp-table erp-table-compact">
            <thead><tr>
              <th data-i18n="hr.structure.colPosition">Pozisyon</th>
              <th data-i18n="hr.emp.colDept">Departman</th>
              <th data-i18n="hr.structure.colCode">Kod</th>
              <th data-i18n="hr.emp.colStatus">Durum</th>
              <th data-i18n="hr.emp.colAction">İşlem</th>
            </tr></thead>
            <tbody id="posBody"><tr><td colspan="5" data-i18n="hr.att.loading">Yükleniyor…</td></tr></tbody>
          </table>
          </div>
        </div>
      </section>
    </div>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/hr-common.js" defer></script>
  <script src="/js/hr-structure.js" defer></script>
  <script>
    function startHrStructurePage() {
      (async function () {
        if (window.i18n && window.i18n.loadDict) await window.i18n.loadDict(window.i18n.getLang());
        await window.initGlobalNavigation?.('hr');
        await window.initHrPageNav?.('structure');
        await window.initHrStructurePage?.();
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startHrStructurePage);
    } else {
      startHrStructurePage();
    }
  </script>
</body>
</html>
