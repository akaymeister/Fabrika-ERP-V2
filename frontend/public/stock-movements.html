<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="stock.mov.title">Stok hareketleri</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left">
        <h1 class="app-page-title" data-i18n="stock.mov.title">Stok hareketleri</h1>
        <p class="subtitle" data-i18n="stock.mov.sub">Giriş ve çıkış kayıtları</p>
      </div>
        <div class="topbar-right">
        <select id="languageSelect" aria-label="Language" class="app-select app-topbar-lang">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/stock.html" class="version-btn" data-i18n="nav.stock">Stok paneli</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">

    <div class="card app-card">
      <div class="filters app-filterbar stock-mov-filters">
        <div class="form-field stock-mov-filter-field">
          <label class="app-label" for="filterP" data-i18n="stock.mov.filterP">Ürün ID (opsiyonel)</label>
          <input type="number" id="filterP" min="1" step="1" class="app-input" data-i18n-placeholder="stock.mov.filterAll" />
        </div>
        <button type="button" class="module-button app-button app-button-secondary stock-mov-refresh-btn" id="btnF" data-i18n="stock.mov.refresh">Yenile</button>
      </div>
      <div class="app-table-scroll stock-mov-table-wrap">
        <table class="app-table">
          <thead>
            <tr>
              <th data-i18n="stock.mov.colDate">Tarih</th>
              <th data-i18n="stock.mov.colCode">Kod</th>
              <th data-i18n="stock.mov.colProduct">Ürün</th>
              <th data-i18n="stock.mov.colType">Tip</th>
              <th data-i18n="stock.mov.colQty">Miktar</th>
              <th data-i18n="stock.mov.colBirim">Birim</th>
              <th data-i18n="stock.mov.colQtyM2Helper">Yardımcı mÂ²</th>
              <th data-i18n="stock.mov.colQtyM3Helper">Yardımcı mÂ³</th>
              <th data-i18n="stock.mov.colFx">Kur (1 USD)</th>
              <th data-i18n="stock.mov.colLineUsd">Tutar (USD)</th>
              <th data-i18n="stock.mov.colLineUzs">Tutar (sistem)</th>
              <th data-i18n="stock.mov.colUser">Kullanıcı</th>
            </tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/stock-common.js" defer></script>
  <script>
    function t(k) {
      return window.i18n ? window.i18n.t(k) : k;
    }
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;');
    }
    function tip(x) {
      if (x === 'in') return t('dashboard.typeIn');
      if (x === 'out') return t('dashboard.typeOut');
      return x || '—';
    }
    function fmtNum(x) {
      const n = Number(x);
      return Number.isFinite(n) ? new Intl.NumberFormat('tr-TR', { maximumFractionDigits: 4 }).format(n) : '—';
    }
    function fmtOptionalNum(x) {
      if (x == null || x === '') return '—';
      return fmtNum(x);
    }
    function rowPrimaryQty(m) {
      if (m && m.primary_qty != null && m.primary_qty !== '' && Number.isFinite(Number(m.primary_qty))) {
        return m.primary_qty;
      }
      if (m && m.qty_pieces != null && m.qty_pieces !== '' && Number.isFinite(Number(m.qty_pieces))) {
        return m.qty_pieces;
      }
      return m ? m.qty : null;
    }
    function rowPrimaryUnit(m) {
      return (m && (m.primary_unit || m.receipt_unit_code || m.unit_code || m.p_unit)) || '—';
    }
    document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
      e.preventDefault();
      fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => {
        window.location.href = '/login.html';
      });
    });
    async function load() {
      const x = document.getElementById('filterP').value;
      const qs = new URLSearchParams();
      if (x) qs.set('productId', x);
      qs.set('limit', '200');
      const { data, ok } = await stockApi('/api/stock/movements?' + qs.toString());
      if (!ok) return;
      const rows = data.movements || [];
      document.getElementById('tb').innerHTML = rows
        .map(
          (m) =>
            `<tr>
            <td>${fmtDate(m.created_at)}</td>
            <td><code class="display-upper">${esc(m.product_code)}</code></td>
            <td class="display-upper">${esc(m.product_name)}</td>
            <td class="display-upper">${esc(tip(m.movement_type))}</td>
            <td>${esc(fmtNum(rowPrimaryQty(m)))}</td>
            <td class="display-upper">${esc(rowPrimaryUnit(m))}</td>
            <td>${esc(fmtOptionalNum(m.calc_m2))}</td>
            <td>${esc(fmtOptionalNum(m.calc_m3))}</td>
            <td>${esc(fmtOptionalNum(m.fx_uzs_per_usd))}</td>
            <td>${esc(fmtOptionalNum(m.line_total_usd))}</td>
            <td>${esc(fmtNum(m.line_total_uzs))}</td>
            <td class="display-upper">${esc(m.user_username || '—')}</td>
          </tr>`
        )
        .join('') || `<tr><td colspan="12">${esc(t('stock.mov.empty'))}</td></tr>`;
    }
    document.getElementById('btnF')?.addEventListener('click', load);
    function startStockMovementsPage() {
      (async function () {
        await initStockPageNav('mov');
        await load();
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startStockMovementsPage);
    } else {
      startStockMovementsPage();
    }
  </script>
</body>
</html>
