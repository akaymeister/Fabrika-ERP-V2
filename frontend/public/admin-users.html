<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kullanıcılar — Fabrika ERP V2</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-admin-nav="users">
  <div class="container">
    <div class="topbar dashboard-topbar">
      <div class="topbar-left">
        <h1>Kullanıcılar</h1>
        <p class="subtitle">Rol atama, aktif/pasif ve şifre sıfırlama</p>
      </div>
      <div class="topbar-right">
        <select id="languageSelect" aria-label="Language" style="max-width:120px;padding:8px;border-radius:8px">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a href="/admin.html" class="version-btn">Süper yönetim</a>
        <a href="#" class="logout-btn" id="logoutBtn">Çıkış</a>
      </div>
    </div>
    <div id="globalNavSlot"></div>
    <div id="navSlot"></div>
    <p id="adminErr" class="login-error" style="display:none;margin:0 0 12px;color:#b91c1c"></p>

    <section class="card admin-section" id="userSection">
      <div class="section-header">
        <h3>Kullanıcılar</h3>
        <p>Sistem kullanıcıları — rol atama, pasif, şifre sıfırlama</p>
      </div>
      <div class="page-actions">
        <a href="/admin-user-new.html" class="module-button" style="width:auto;padding:10px 16px;text-decoration:none">Yeni kullanıcı</a>
      </div>
      <div style="overflow-x:auto;margin-top:12px">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Kullanıcı</th>
              <th>Ad</th>
              <th>Rol</th>
              <th>Aktif</th>
              <th>İşlemler</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/admin-common.js" defer></script>
  <script src="/js/admin.js" defer></script>
</body>
</html>
