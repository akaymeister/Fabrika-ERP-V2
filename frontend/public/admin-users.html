<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kullanıcılar — Fabrika ERP V2</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-admin-nav="users" class="app-shell app-master-page app-ui-v3 admin-users-page">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs admin-users-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
          <h1 class="app-page-title" data-i18n="admin.users">Kullanıcılar</h1>
          <p class="subtitle" data-i18n="admin.usersSub">Sistem kullanıcıları — rol atama, pasif, şifre sıfırlama</p>
        </div>
        <div class="topbar-right app-toolbar-right">
          <select id="languageSelect" aria-label="Language" class="admin-users-lang app-select app-topbar-lang">
            <option value="tr">Türkçe</option>
            <option value="uz">O‘zbekcha</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
        </div>
      </header>
      <div class="app-content">
        <main class="app-master-main admin-users-content">
          <div class="app-a11y-hide" aria-hidden="true">
            <button type="button" id="adminUserMenuBtn" tabindex="-1"></button>
            <div id="adminUserMenu" role="menu" hidden></div>
            <span id="adminUserAvatar"></span>
            <strong id="adminUserName"></strong>
            <small id="adminUserRole"></small>
            <a href="#" id="logoutBtn" tabindex="-1"></a>
            <button type="button" id="logoutBtnMenu" tabindex="-1"></button>
          </div>
          <p id="adminErr" class="login-error app-error-state admin-users-err"></p>
          <section class="card admin-section admin-users-card app-card" id="userSection">
            <div class="app-page-toolbar admin-users-toolbar-wrap">
              <div class="app-toolbar-left app-filterbar admin-users-toolbar">
                <input type="search" class="app-input app-search-input admin-users-search-input" placeholder="Kullanıcı ara..." aria-label="search users" />
                <button type="button" class="secondary-btn app-button app-button-secondary admin-users-filter-btn">Filtrele</button>
              </div>
              <div class="app-toolbar-right">
                <a href="/admin-user-new.html" class="module-button admin-users-new-btn app-button app-button-primary" data-i18n="admin.newUserBtn">+ Yeni kullanıcı</a>
              </div>
            </div>

            <div class="admin-users-table-wrap admin-users-table-panel">
              <table class="admin-users-table app-table">
                <thead>
                  <tr>
                    <th>Kullanıcı Adı</th>
                    <th>Ad Soyad</th>
                    <th>E-Posta</th>
                    <th>Rol</th>
                    <th>Durum</th>
                    <th class="app-table-col-action">İşlemler</th>
                  </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
              </table>
            </div>
            <div class="admin-users-pagination">
              <span>Toplam <strong id="totalUsersCount">0</strong> kullanıcı</span>
              <div class="admin-users-page-list">
                <button type="button" class="admin-users-page-btn active">1</button>
                <button type="button" class="admin-users-page-btn">2</button>
                <button type="button" class="admin-users-page-btn">3</button>
                <span>...</span>
                <button type="button" class="admin-users-page-btn">5</button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </div>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/admin-common.js" defer></script>
  <script src="/js/admin.js" defer></script>
</body>
</html>
