<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="hr.emp.list.title">Personeller</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3 hr-employees-page">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
          <h1 class="app-page-title" data-i18n="hr.emp.list.title">Personeller</h1>
          <p class="subtitle" data-i18n="hr.emp.list.sub">Liste</p>
        </div>
        <div class="topbar-right app-toolbar-right">
          <select id="languageSelect" aria-label="Language" class="app-select app-topbar-lang">
            <option value="tr">Türkçe</option>
            <option value="uz">O‘zbekcha</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
          <a data-topbar-persist="1" href="/hr.html" class="version-btn app-button app-button-secondary" data-i18n="nav.hr.hub">IK</a>
        </div>
      </header>
      <div class="app-content">
        <main class="app-master-main">

    <div class="card app-card">
      <h2 class="app-card-title" data-i18n="hr.emp.list.title">Personel listesi</h2>
      <p class="muted app-muted-text" data-i18n="hr.emp.filtersTitle">Filtreler</p>
      <div class="app-page-toolbar emp-filter-toolbar">
        <div class="app-toolbar-left app-filterbar emp-filter-grid">
          <select id="statusFilter" class="app-select">
            <option value="" data-i18n="hr.emp.allStatus">Tüm durumlar</option>
            <option value="active" data-i18n="hr.emp.status.active">Aktif</option>
            <option value="passive" data-i18n="hr.emp.status.passive">Pasif</option>
            <option value="terminated" data-i18n="hr.emp.status.terminated">İşten ayrıldı</option>
          </select>
          <select id="natFilter" class="app-select">
            <option value="" data-i18n="hr.emp.filterNat">Uyruk</option>
            <option value="TR" data-i18n="hr.emp.nat.TR">TR</option>
            <option value="UZ" data-i18n="hr.emp.nat.UZ">UZ</option>
            <option value="RU" data-i18n="hr.emp.nat.RU">RU</option>
            <option value="EN" data-i18n="hr.emp.nat.EN">EN</option>
            <option value="OTHER" data-i18n="hr.emp.nat.OTHER">Diğer</option>
          </select>
          <select id="countryFilter" class="app-select">
            <option value="" data-i18n="hr.emp.filterCountry">Ülke</option>
            <option value="TR" data-i18n="hr.emp.country.tr">Türkiye</option>
            <option value="UZ" data-i18n="hr.emp.country.uz">Özbekistan</option>
          </select>
          <select id="regionFilter" class="app-select" disabled>
            <option value="" data-i18n="hr.emp.filterRegion">İl / bölge</option>
          </select>
          <select id="departmentFilter" class="app-select"><option value="" data-i18n="hr.emp.filterDept">Departman</option></select>
          <select id="positionFilter" class="app-select"><option value="" data-i18n="hr.emp.filterPos">Pozisyon</option></select>
          <input id="searchInput" type="search" class="app-input app-search-input emp-filter-search" data-i18n-placeholder="hr.emp.search" placeholder="Ara" />
        </div>
        <div class="app-toolbar-right emp-filter-actions">
          <button id="btnSearch" type="button" class="version-btn app-button app-button-primary" data-i18n="hr.emp.filter">Filtrele</button>
          <a href="/hr-employee-form.html" class="version-btn app-button app-button-primary emp-new-link" data-i18n="hr.emp.new">Yeni personel</a>
        </div>
      </div>
      <p id="msg" class="muted emp-list-msg"></p>
      <div class="card app-card emp-table-card">
        <div class="emp-table-wrap">
          <table class="app-table">
            <thead>
              <tr id="empHeadRow">
                <th data-i18n="hr.emp.colPhoto">Foto</th>
                <th data-i18n="hr.emp.colName">Ad soyad</th>
                <th data-i18n="hr.emp.colDept">Departman</th>
                <th data-i18n="hr.emp.colPos">Pozisyon</th>
                <th data-i18n="hr.emp.colUser">Kullanıcı</th>
                <th class="app-table-col-action" data-i18n="hr.emp.colAction">İşlem</th>
              </tr>
            </thead>
            <tbody id="empBody"><tr><td colspan="6" data-i18n="hr.att.loading">Yükleniyor…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/hr-common.js" defer></script>
  <script src="/js/location-data.js" defer></script>
  <script src="/js/hr-employees.js" defer></script>
  <script>
    function startHrEmployeesPage() {
      (async function () {
        if (window.i18n && window.i18n.loadDict) await window.i18n.loadDict(window.i18n.getLang());
        await window.initGlobalNavigation?.('hr');
        await window.initHrPageNav?.('employees');
        await window.initHrEmployeesPage?.();
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startHrEmployeesPage);
    } else {
      startHrEmployeesPage();
    }
  </script>
</body>
</html>
