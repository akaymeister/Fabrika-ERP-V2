<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="stock.brands.title">Markalar — Stok</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3 erp-page stock-brands-page">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
        <h1 class="app-page-title" data-i18n="stock.brands.title">Markalar</h1>
        <p class="subtitle" data-i18n="stock.brands.sub">Aynı ürün adı farklı markada tekrar edebilir</p>
      </div>
        <div class="topbar-right app-toolbar-right">
        <select id="languageSelect" aria-label="Language" class="app-select app-topbar-lang">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/stock.html" class="btn btn-secondary" data-i18n="nav.stock">Stok paneli</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">


    <div class="grid">
      <div class="card app-card erp-card">
        <h3 id="formCardTitle" class="app-card-title" data-i18n="stock.brands.new">Yeni marka</h3>
        <form id="fBrand" class="product-form-grid stock-brands-form-grid">
          <input type="hidden" id="editBrandId" value="" />
          <div class="form-field">
            <label class="app-label" for="brandName" data-i18n="stock.brands.name">Marka adı</label>
            <input type="text" id="brandName" class="input-upper app-input" required maxlength="200" />
          </div>
          <div class="app-form-actions">
            <button type="submit" id="btnBrandSubmit" class="btn btn-primary" data-i18n="stock.brands.save">Kaydet</button>
            <button type="button" id="btnBrandCancel" class="btn btn-secondary stock-brands-cancel" data-i18n="stock.brands.cancel">Vazgeç</button>
          </div>
        </form>
        <p id="brandMsg" class="login-error stock-brands-inline-err" role="alert"></p>
        <p id="brandLoadMsg" class="login-error stock-brands-inline-err" role="alert"></p>
      </div>
    </div>

    <div class="card app-card erp-card stock-brands-list-card">
      <h3 class="app-card-title" data-i18n="stock.brands.list">Marka listesi</h3>
      <div class="app-table-scroll">
        <table class="app-table">
          <thead>
            <tr>
              <th data-i18n="stock.brands.colId">ID</th>
              <th data-i18n="stock.brands.colName">Ad</th>
              <th data-i18n="stock.brands.colAt">Kayıt</th>
              <th data-i18n="stock.brands.colAction">İşlem</th>
            </tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/stock-common.js" defer></script>
  <script>
    function t(k) {
      return window.i18n ? window.i18n.t(k) : k;
    }
    document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
      e.preventDefault();
      fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => {
        window.location.href = '/login.html';
      });
    });
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;');
    }
    function setFormNew() {
      document.getElementById('editBrandId').value = '';
      const h = document.getElementById('formCardTitle');
      if (h) {
        h.setAttribute('data-i18n', 'stock.brands.new');
        h.textContent = t('stock.brands.new');
        if (window.i18n) {
          window.i18n.apply(h);
        }
      }
      const b = document.getElementById('btnBrandSubmit');
      if (b) {
        b.setAttribute('data-i18n', 'stock.brands.save');
        b.textContent = t('stock.brands.save');
        if (window.i18n) {
          window.i18n.apply(b);
        }
      }
      const c = document.getElementById('btnBrandCancel');
      if (c) {
        c.style.display = 'none';
      }
    }
    function setFormEdit(brand) {
      document.getElementById('editBrandId').value = String(brand.id);
      document.getElementById('brandName').value = brand.name || '';
      const h = document.getElementById('formCardTitle');
      if (h) {
        h.removeAttribute('data-i18n');
        h.textContent = t('stock.brands.formEdit');
      }
      const b = document.getElementById('btnBrandSubmit');
      if (b) {
        b.setAttribute('data-i18n', 'stock.brands.update');
        b.textContent = t('stock.brands.update');
        if (window.i18n) {
          window.i18n.apply(b);
        }
      }
      const c = document.getElementById('btnBrandCancel');
      if (c) {
        c.style.display = 'inline-block';
        if (window.i18n) {
          window.i18n.apply(c);
        }
      }
      document.getElementById('fBrand')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    async function load() {
      const elErr = document.getElementById('brandLoadMsg');
      if (elErr) {
        elErr.style.display = 'none';
        elErr.textContent = '';
      }
      const { data, ok, status } = await stockApi('/api/stock/brands');
      if (!ok) {
        if (elErr) {
          const m = window.i18n?.apiErrorText ? window.i18n.apiErrorText(data) : (data && data.message) || '';
          elErr.textContent = t('stock.brands.loadError') + (status ? ' [' + status + ']' : '') + ': ' + (m || '—');
          elErr.style.display = 'block';
        }
        const tb = document.getElementById('tb');
        if (tb) {
          tb.innerHTML = `<tr><td colspan="4">${esc(t('stock.brands.loadEmptyHint'))}</td></tr>`;
        }
        return;
      }
      const rows = data.brands || [];
      const editL = t('stock.brands.edit');
      const delL = t('stock.brands.delete');
      const sysL = t('stock.brands.badgeSystem');
      document.getElementById('tb').innerHTML = rows
        .map((b) => {
          const isSys = b.slug === 'unbranded';
          const nameCell = isSys
            ? `<strong>${esc(b.name)}</strong> <span class="stock-brands-sys-meta">(${esc(sysL)})</span>`
            : `<strong>${esc(b.name)}</strong>`;
          const actions = isSys
            ? `<div class="erp-table-actions app-action-bar"><button type="button" class="btn btn-secondary btn-sm btn-edit app-action-button app-action-edit" data-action="edit" data-id="${b.id}">${esc(
                editL
              )}</button></div>`
            : `<div class="erp-table-actions app-action-bar"><button type="button" class="btn btn-secondary btn-sm btn-edit app-action-button app-action-edit" data-action="edit" data-id="${b.id}">${esc(
                editL
              )}</button><button type="button" class="btn btn-danger btn-sm app-action-button app-action-delete" data-action="delete" data-id="${b.id}">${esc(
                delL
              )}</button></div>`;
          return `<tr>
            <td>${b.id}</td>
            <td class="display-upper">${nameCell}</td>
            <td>${typeof fmtDate === 'function' ? fmtDate(b.created_at) : esc(b.created_at || '—')}</td>
            <td>${actions}</td>
          </tr>`;
        })
        .join('') || `<tr><td colspan="4">${esc(t('stock.brands.empty'))}</td></tr>`;
      document.getElementById('tb')?.querySelectorAll('button[data-action="edit"]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const id = +btn.getAttribute('data-id');
          const b = rows.find((x) => +x.id === id);
          if (b) {
            setFormEdit(b);
          }
        });
      });
      document.getElementById('tb')?.querySelectorAll('button[data-action="delete"]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = +btn.getAttribute('data-id');
          if (!id || !confirm(t('stock.brands.deleteConfirm'))) {
            return;
          }
          const { data, ok } = await stockApi('/api/stock/brands/' + id, { method: 'DELETE' });
          if (!ok) {
            const msg = document.getElementById('brandMsg');
            msg.textContent = window.i18n?.apiErrorText ? window.i18n.apiErrorText(data) : data.message || '—';
            msg.style.display = 'block';
            return;
          }
          setFormNew();
          document.getElementById('fBrand')?.reset();
          const msg = document.getElementById('brandMsg');
          msg.style.display = 'none';
          await load();
        });
      });
    }
    document.getElementById('fBrand')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('brandMsg');
      msg.style.display = 'none';
      const name = toUpperTrClient(document.getElementById('brandName').value.trim());
      const bn = document.getElementById('brandName');
      if (bn) bn.value = name;
      const eid = document.getElementById('editBrandId').value;
      const isEdit = eid !== '';
      const { ok, data } = await stockApi(
        isEdit ? '/api/stock/brands/' + encodeURIComponent(eid) : '/api/stock/brands',
        isEdit
          ? { method: 'PATCH', body: JSON.stringify({ name }) }
          : { method: 'POST', body: JSON.stringify({ name }) }
      );
      if (!ok) {
        msg.textContent = window.i18n?.apiErrorText ? window.i18n.apiErrorText(data) : data.message || '—';
        msg.style.display = 'block';
        return;
      }
      setFormNew();
      document.getElementById('fBrand').reset();
      await load();
    });
    document.getElementById('btnBrandCancel')?.addEventListener('click', () => {
      setFormNew();
      document.getElementById('fBrand')?.reset();
    });
    document.getElementById('brandName')?.addEventListener('blur', function () {
      this.value = toUpperTrClient(this.value);
    });
    function startBrandsPage() {
      (async () => {
        try {
          await initStockPageNav('brands');
          await load();
        } catch (err) {
          const el = document.getElementById('brandLoadMsg');
          if (el) {
            el.textContent = t('stock.brands.loadError') + ': ' + (err && err.message ? err.message : String(err));
            el.style.display = 'block';
          }
        }
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startBrandsPage);
    } else {
      startBrandsPage();
    }
  </script>
</body>
</html>
