<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="purch.wf.listTitle">SATINALMA TALEPLERİ — KONTROL & ONAY</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3 erp-page purchase-requests-page">
  <div class="container pur-wide app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left">
          <h1 class="app-page-title" data-i18n="purch.wf.listTitle">SATINALMA TALEPLERİ</h1>
          <p class="subtitle" data-i18n="purch.wf.listSub">Liste, detay, onay / red / revizyon</p>
        </div>
        <div class="topbar-right app-toolbar-right">
          <select id="languageSelect" data-i18n-placeholder="lang.label" class="app-select app-topbar-lang" aria-label="Language">
            <option value="tr">Türkçe</option>
            <option value="uz">O‘zbekcha</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
          <a data-topbar-persist="1" href="/purchasing.html" class="btn btn-secondary" data-i18n="nav.purch.hub">Satınalma</a>
        </div>
      </header>
      <div class="app-content">
        <main class="app-master-main">
    <p id="msg" class="app-msg-slot" role="status"></p>
    <div class="pur-list-actions app-filterbar">
      <a class="btn btn-secondary" href="/purchase-requisition-open.html" data-i18n="nav.purch.requisitionOpen">Talep aç</a>
      <a class="btn btn-primary" href="/purchase-processing.html" data-i18n="nav.purch.processing">Satınalma işleme</a>
    </div>
    <div class="pr-layout">
      <section class="card app-card erp-card">
        <div class="app-filterbar">
          <label class="app-label" for="fFilter" data-i18n="purch.wf.filter">Durum</label>
          <select id="fFilter" class="app-select">
            <option value="" data-i18n="purch.wf.filterAll">Tümü</option>
            <option value="draft" data-i18n="purch.status.reqV2.draft">Taslak</option>
            <option value="pending" data-i18n="purch.status.req.pending">Onay bekliyor</option>
            <option value="approved" data-i18n="purch.status.req.approved">Onaylandı</option>
            <option value="rejected" data-i18n="purch.status.req.rejected">Reddedildi</option>
            <option value="revision_requested" data-i18n="purch.status.reqV2.revision">Revizyon</option>
            <option value="ordered" data-i18n="purch.status.reqV2.ordered">Satınalmaya aktarıldı</option>
            <option value="partial" data-i18n="purch.status.req.partial">Kısmi</option>
            <option value="cancelled" data-i18n="purch.status.ord.cancelled">İptal</option>
          </select>
        </div>
        <div class="app-table-scroll">
          <table class="app-table">
            <thead>
              <tr>
                <th data-i18n="purch.req.lColCode">Talep no</th>
                <th data-i18n="purch.req.lColProject">Proje</th>
                <th data-i18n="purch.req.lColUser">Talep eden</th>
                <th data-i18n="purch.req.lColStatus">Durum</th>
                <th data-i18n="purch.wf.colProcure">Tedarik</th>
                <th data-i18n="purch.wf.colDate">Tarih</th>
              </tr>
            </thead>
            <tbody id="reqBody"><tr><td colspan="6" data-i18n="purch.req.loading">Yükleniyor…</td></tr></tbody>
          </table>
        </div>
      </section>
      <section class="card app-card erp-card" id="detailPanel">
        <p class="muted" data-i18n="purch.wf.selectRow">Bir satır seçin…</p>
      </section>
    </div>
        </main>
      </div>
    </div>
  </div>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/purchasing-common.js" defer></script>
  <script src="/js/purchase-requests-workflow.js" defer></script>
</body>
</html>
