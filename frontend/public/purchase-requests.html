<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="purch.wf.listTitle">Satınalma talepleri — kontrol & onay</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .pr-layout { display: grid; grid-template-columns: 1fr 1.1fr; gap: 16px; align-items: start; }
    @media (max-width: 1000px) { .pr-layout { grid-template-columns: 1fr; } }
    .pr-row-sel { background: #e0f2fe !important; }
    .pr-det-table th, .pr-det-table td { font-size: 13px; padding: 6px 8px; }
    .pur-list-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; align-items: center; }
  </style>
</head>
<body>
  <div class="container pur-wide">
    <div class="topbar dashboard-topbar">
      <div class="topbar-left">
        <h1 data-i18n="purch.wf.listTitle">Satınalma talepleri</h1>
        <p class="subtitle" data-i18n="purch.wf.listSub">Liste, detay, onay / red / revizyon</p>
      </div>
      <div class="topbar-right">
        <select id="languageSelect" data-i18n-placeholder="lang.label" style="max-width:120px;padding:8px;border-radius:8px" aria-label="Language">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a href="/purchasing.html" class="version-btn" data-i18n="nav.purch.hub">Satınalma</a>
        <a href="/" class="version-btn" data-i18n="nav.dashboard">Ana sayfa</a>
        <a href="#" class="logout-btn" id="logoutBtn" data-i18n="nav.logout">Çıkış</a>
      </div>
    </div>
    <div id="navSlot"></div>
    <p id="msg" style="min-height:1.2em;margin:8px 0" role="status"></p>
    <div class="pur-list-actions">
      <a class="version-btn" href="/purchase-requisition-open.html" data-i18n="nav.purch.requisitionOpen" style="text-decoration:none">Talep aç</a>
      <a class="version-btn" href="/purchase-processing.html" data-i18n="nav.purch.processing" style="text-decoration:none;background:#1d4ed8">Satınalma işleme</a>
    </div>
    <div class="pr-layout">
      <section class="card">
        <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px">
          <label for="fFilter" data-i18n="purch.wf.filter">Durum</label>
          <select id="fFilter" style="padding:8px;border-radius:8px;min-width:180px">
            <option value="" data-i18n="purch.wf.filterAll">Tümü</option>
            <option value="draft" data-i18n="purch.status.reqV2.draft">Taslak</option>
            <option value="pending" data-i18n="purch.status.req.pending">Onay bekliyor</option>
            <option value="approved" data-i18n="purch.status.req.approved">Onaylandı</option>
            <option value="rejected" data-i18n="purch.status.req.rejected">Reddedildi</option>
            <option value="revision_requested" data-i18n="purch.status.reqV2.revision">Revizyon</option>
            <option value="ordered" data-i18n="purch.status.reqV2.ordered">Satınalmaya aktarıldı</option>
            <option value="partial" data-i18n="purch.status.ord.partial">Kısmi</option>
            <option value="cancelled" data-i18n="purch.status.ord.cancelled">İptal</option>
          </select>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th data-i18n="purch.req.lColCode">Talep no</th>
                <th data-i18n="purch.req.lColProject">Proje</th>
                <th data-i18n="purch.req.lColUser">Talep eden</th>
                <th data-i18n="purch.req.lColStatus">Durum</th>
                <th data-i18n="purch.wf.colDate">Tarih</th>
              </tr>
            </thead>
            <tbody id="reqBody"><tr><td colspan="5" data-i18n="purch.req.loading">Yükleniyor…</td></tr></tbody>
          </table>
        </div>
      </section>
      <section class="card" id="detailPanel">
        <p class="muted" data-i18n="purch.wf.selectRow">Bir satır seçin…</p>
      </section>
    </div>
  </div>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/purchasing-common.js" defer></script>
  <script src="/js/purchase-requests-workflow.js" defer></script>
</body>
</html>
