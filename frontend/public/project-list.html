<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="project.add.pageTitle">Proje ekle</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3 erp-page project-list-page">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
        <h1 class="app-page-title erp-page-title" data-i18n="project.add.pageTitle">Proje ekle</h1>
        <p class="subtitle" data-i18n="project.add.sub">Yeni proje kaydı ve tüm kayıtlar</p>
      </div>
        <div class="topbar-right app-toolbar-right">
        <select id="languageSelect" data-i18n-placeholder="lang.label" aria-label="Language" class="app-select app-topbar-lang" title="Language">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/projects.html" class="btn btn-secondary" data-i18n="nav.project.hub">Özet</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">


    <section class="card erp-card project-list-form-card">
      <h3 data-i18n="project.form.addTitle">Yeni proje</h3>
      <p class="form-hint muted project-list-form-hint" data-i18n="project.form.codeAuto"></p>
      <form id="fAdd" class="erp-form erp-form-grid project-list-form-grid">
        <div
          class="form-field-row project-list-name-row"
        >
          <div class="form-field project-list-tight-field">
            <label for="projectName" data-i18n="project.form.name">Proje adı</label>
            <input type="text" id="projectName" class="input-upper" required maxlength="300" autocomplete="off" data-i18n-placeholder="project.form.namePh" />
          </div>
          <div class="form-field project-list-tight-field">
            <label for="projectShort" data-i18n="project.form.shortName">Kısa ad</label>
            <input
              type="text"
              id="projectShort"
              class="input-upper"
              required
              minlength="2"
              maxlength="8"
              autocomplete="off"
              spellcheck="false"
              inputmode="text"
              data-i18n-placeholder="project.form.shortNamePh"
            />
          </div>
        </div>
        <div class="erp-form-actions">
          <button type="submit" class="btn btn-primary" data-i18n="project.form.submit">Kaydet</button>
        </div>
      </form>
      <p id="addMsg" class="login-error project-list-msg is-hidden" role="alert"></p>
    </section>

    <div class="card erp-card project-list-edit-card is-hidden" id="editCard">
      <h3 data-i18n="project.form.editTitle">Proje adını düzenle</h3>
      <p class="muted project-list-edit-line" id="editCodeLine"></p>
      <form id="fEdit" class="erp-form erp-form-grid project-list-form-grid">
        <input type="hidden" id="editId" value="" />
        <div class="form-field">
          <label for="editName" data-i18n="project.form.name">Proje adı</label>
          <input type="text" id="editName" class="input-upper" required maxlength="300" autocomplete="off" />
        </div>
        <div class="erp-form-actions">
          <button type="submit" class="btn btn-primary" data-i18n="project.form.saveEdit">Kaydet</button>
          <button type="button" class="btn btn-secondary" id="btnCancelEdit" data-i18n="project.form.cancelEdit">Vazgeç</button>
        </div>
      </form>
      <p id="editMsg" class="login-error project-list-msg is-hidden" role="alert"></p>
    </div>

    <div class="card erp-card project-list-table-card">
      <h3 data-i18n="project.hub.listTitle">Projeler</h3>
      <p id="okMsg" class="form-hint project-list-msg project-list-msg-ok is-hidden" role="status" data-i18n="project.hub.created">Proje kaydedildi</p>
      <p id="okEditMsg" class="form-hint project-list-msg project-list-msg-ok is-hidden" role="status" data-i18n="project.hub.updated">Güncellendi</p>
      <p id="loadMsg" class="login-error project-list-msg is-hidden" role="alert"></p>
      <div class="erp-table-wrap">
        <table class="erp-table erp-table-compact app-table">
          <thead>
            <tr>
              <th data-i18n="project.list.colName">Proje adı</th>
              <th data-i18n="project.list.colShort">Kısa ad</th>
              <th data-i18n="project.list.colCode">Proje kodu</th>
              <th data-i18n="project.list.colStatus">Durum</th>
              <th data-i18n="project.list.colActions">İşlemler</th>
            </tr>
          </thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/ui-notify.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/project-common.js" defer></script>
  <script>
    function t(k) {
      return window.i18n ? window.i18n.t(k) : k;
    }
    function showMsg(id, err) {
      const el = document.getElementById(id);
      if (!el) return;
      if (err) {
        el.textContent = err;
        el.style.display = 'block';
      } else {
        el.textContent = '';
        el.style.display = 'none';
      }
    }
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;');
    }
    let listCache = [];
    function cancelEdit() {
      const c = document.getElementById('editCard');
      if (c) c.style.display = 'none';
      showMsg('editMsg', '');
      document.getElementById('editId').value = '';
    }
    function openEdit(p) {
      const c = document.getElementById('editCard');
      const eid = document.getElementById('editId');
      const en = document.getElementById('editName');
      const line = document.getElementById('editCodeLine');
      if (eid) eid.value = String(p.id);
      if (en) en.value = p.name || '';
      if (line) {
        const prefix = t('project.edit.codeLine');
        line.textContent = `${prefix}: ${p.project_code || '—'}`;
      }
      if (c) {
        c.style.display = 'block';
        c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        en?.focus();
      }
    }
    async function loadList() {
      showMsg('loadMsg', '');
      const { ok, data } = await projectApi('/api/projects');
      if (!ok) {
        const err = window.i18n && window.i18n.apiErrorText ? window.i18n.apiErrorText(data) : t('api.error.unknown');
        showMsg('loadMsg', err);
        return;
      }
      listCache = (data && data.projects) || [];
      renderRows(listCache);
    }
    function renderRows(rows) {
      const tb = document.getElementById('tb');
      if (!tb) return;
      if (!rows || !rows.length) {
        tb.innerHTML = `<tr><td colspan="5" class="muted" data-i18n="project.list.empty">Henüz proje yok</td></tr>`;
        if (window.i18n) window.i18n.apply(tb);
        return;
      }
      tb.innerHTML = rows
        .map((p) => {
          const id = esc(p.id);
          const isActive = String(p.status || '') === 'active';
          const aState = isActive ? ' project-st--on' : ' project-st--dim';
          const pState = isActive ? ' project-st--dim' : ' project-st--on';
          return `<tr>
        <td class="display-upper"><strong>${esc(p.name)}</strong></td>
        <td><code class="display-upper project-list-code">${esc(p.short_code || '—')}</code></td>
        <td><code class="display-upper project-list-code">${esc(p.project_code)}</code></td>
        <td class="td-project-status">
          <div class="project-st-toggle" role="group" aria-label="${esc(t('project.list.colStatus'))}">
            <button type="button" class="btn btn-sm project-st-btn project-status-btn project-st--active${aState}" data-pid="${id}" data-st="active" data-i18n="project.status.btnActive">Aktif</button>
            <button type="button" class="btn btn-sm project-st-btn project-status-btn project-st--passive${pState}" data-pid="${id}" data-st="on_hold" data-i18n="project.status.btnPassive">Pasif</button>
          </div>
        </td>
        <td class="user-actions td-project-actions">
          <div class="table-actions erp-table-actions">
            <button type="button" class="btn btn-sm btn-secondary btn-edit" data-edit-id="${id}" data-i18n="project.action.edit">Düzenle</button>
            <button type="button" class="btn btn-sm btn-danger" data-del-id="${id}" data-i18n="project.action.delete">Sil</button>
          </div>
        </td>
      </tr>`;
        })
        .join('');
      if (window.i18n) window.i18n.apply(tb);
      tb.querySelectorAll('[data-edit-id]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const i = Number.parseInt(btn.getAttribute('data-edit-id'), 10);
          const p = listCache.find((x) => x.id === i);
          if (p) openEdit(p);
        });
      });
      tb.querySelectorAll('[data-del-id]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const i = Number.parseInt(btn.getAttribute('data-del-id'), 10);
          if (!i) return;
          if (!window.confirm(t('project.confirmDelete'))) return;
          const { ok, data } = await projectApi('/api/projects/' + i, { method: 'DELETE' });
          if (!ok) {
            const err = window.i18n && window.i18n.apiErrorText ? window.i18n.apiErrorText(data) : t('api.error.unknown');
            if (window.appNotify && typeof window.appNotify.modalError === 'function') {
              window.appNotify.modalError(err, t('ui.notify.errorTitle'));
            }
            return;
          }
          if (String(document.getElementById('editId')?.value) === String(i)) cancelEdit();
          await loadList();
        });
      });
      tb.querySelectorAll('button.project-status-btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const pid = Number.parseInt(btn.getAttribute('data-pid') || '0', 10);
          const st = btn.getAttribute('data-st') || '';
          if (!pid || !st) return;
          const p = listCache.find((x) => String(x.id) === String(pid));
          if (p && String(p.status) === st) {
            return;
          }
          const { ok, data } = await projectApi('/api/projects/' + pid, {
            method: 'PATCH',
            body: JSON.stringify({ status: st }),
          });
          if (!ok) {
            const err = window.i18n && window.i18n.apiErrorText ? window.i18n.apiErrorText(data) : t('api.error.unknown');
            if (window.appNotify && typeof window.appNotify.modalError === 'function') {
              window.appNotify.modalError(err, t('ui.notify.errorTitle'));
            }
            return;
          }
          await loadList();
        });
      });
    }
    document.getElementById('languageSelect')?.addEventListener('change', (e) => {
      const v = e.target.value;
      if (v && window.i18n) {
        localStorage.setItem('erp_lang', v);
        window.i18n.loadDict(v).then(() => {
          window.i18n.apply(document);
          if (window.i18n.setDocumentLang) window.i18n.setDocumentLang(v);
        });
      }
    });
    document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
      e.preventDefault();
      fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => {
        window.location.href = '/login.html';
      });
    });
    function normalizeShortClient(s) {
      return String(s ?? '')
        .trim()
        .toLocaleUpperCase('tr-TR')
        .replace(/[^A-Z0-9]/g, '');
    }
    document.getElementById('projectName')?.addEventListener('blur', function () {
      this.value = toUpperTrClient(this.value);
    });
    document.getElementById('projectShort')?.addEventListener('blur', function () {
      this.value = normalizeShortClient(this.value);
    });
    document.getElementById('editName')?.addEventListener('blur', function () {
      this.value = toUpperTrClient(this.value);
    });
    document.getElementById('btnCancelEdit')?.addEventListener('click', cancelEdit);
    document.getElementById('fAdd')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      showMsg('addMsg', '');
      const name = toUpperTrClient(document.getElementById('projectName')?.value || '');
      const shortName = normalizeShortClient(document.getElementById('projectShort')?.value || '');
      const nameIn = document.getElementById('projectName');
      const shortIn = document.getElementById('projectShort');
      if (nameIn) nameIn.value = name;
      if (shortIn) shortIn.value = shortName;
      if (!shortName || shortName.length < 2) {
        showMsg('addMsg', t('api.project.short_required'));
        return;
      }
      const { ok, data } = await projectApi('/api/projects', {
        method: 'POST',
        body: JSON.stringify({ name, shortName }),
      });
      if (!ok) {
        const err = window.i18n && window.i18n.apiErrorText ? window.i18n.apiErrorText(data) : t('api.error.unknown');
        showMsg('addMsg', err);
        return;
      }
      if (nameIn) nameIn.value = '';
      if (shortIn) shortIn.value = '';
      const u = new URL(window.location.href);
      u.searchParams.set('created', '1');
      window.location.href = u.toString();
    });
    document.getElementById('fEdit')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      showMsg('editMsg', '');
      const id = Number.parseInt(document.getElementById('editId')?.value || '0', 10);
      const name = toUpperTrClient(document.getElementById('editName')?.value || '');
      const { ok, data } = await projectApi('/api/projects/' + id, {
        method: 'PUT',
        body: JSON.stringify({ name }),
      });
      if (!ok) {
        const err = window.i18n && window.i18n.apiErrorText ? window.i18n.apiErrorText(data) : t('api.error.unknown');
        showMsg('editMsg', err);
        return;
      }
      const okEdit = document.getElementById('okEditMsg');
      if (okEdit) {
        okEdit.style.display = 'block';
        if (window.i18n) window.i18n.apply(okEdit);
      }
      cancelEdit();
      await loadList();
    });
    function startProjectsListPage() {
      (async function load() {
        try {
          const u = new URL(window.location.href);
          if (u.searchParams.get('created') === '1') {
            const ok = document.getElementById('okMsg');
            if (ok) {
              ok.style.display = 'block';
              if (window.i18n) window.i18n.apply(ok);
            }
            u.searchParams.delete('created');
            window.history.replaceState(
              {},
              '',
              u.pathname + (u.searchParams.toString() ? `?${u.searchParams}` : '') + u.hash
            );
          }
        } catch {
          /* ignore */
        }
        const lang = window.i18n && window.i18n.getLang ? window.i18n.getLang() : 'tr';
        if (window.i18n && window.i18n.loadDict) {
          await window.i18n.loadDict(lang);
        }
        const sel = document.getElementById('languageSelect');
        if (sel) sel.value = lang;
        if (window.i18n && window.i18n.setDocumentLang) window.i18n.setDocumentLang(lang);
        if (window.i18n && window.i18n.apply) window.i18n.apply(document);
        if (window.initProjectPageNav) {
          await window.initProjectPageNav('add');
        }
        await loadList();
        document.getElementById('projectName')?.focus();
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startProjectsListPage);
    } else {
      startProjectsListPage();
    }
  </script>
</body>
</html>
