<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="project.costs.pageTitle">Proje maliyet kontrolü</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3 project-costs-page">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
          <h1 class="app-page-title" data-i18n="project.costs.pageTitle">Proje maliyet kontrolü</h1>
          <p class="subtitle" data-i18n="project.costs.sub">Planlanan bölüm</p>
        </div>
        <div class="topbar-right app-toolbar-right">
          <select id="languageSelect" data-i18n-placeholder="lang.label" aria-label="Language" class="app-select app-topbar-lang" title="Language">
            <option value="tr">Türkçe</option>
            <option value="uz">O‘zbekcha</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
          <a data-topbar-persist="1" href="/projects.html" class="version-btn app-button app-button-secondary" data-i18n="nav.project.hub">Özet</a>
        </div>
      </header>
      <div class="app-content">
        <main class="app-master-main">

    <div class="card app-card project-placeholder-card">
      <span class="module-tag plan-tag" data-i18n="dashboard.tagPlan">Yakında</span>
      <h2 class="project-placeholder-title" data-i18n="project.placeholder.title">Geliştirme aşamasında</h2>
      <p class="muted" data-i18n="project.costs.placeholderP">Bütçe, gerçekleşen maliyet ve sapma; sonraki sürümler.</p>
    </div>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/project-common.js" defer></script>
  <script>
    /* defer script’lerden sonra çalışmalı; aksi halde initProjectPageNav tanımsız kalır */
    function startProjectCostsPage() {
      document.getElementById('languageSelect')?.addEventListener('change', (e) => {
        const v = e.target.value;
        if (v && window.i18n) {
          localStorage.setItem('erp_lang', v);
          window.i18n.loadDict(v).then(async () => {
            window.i18n.apply(document);
            if (window.i18n.setDocumentLang) window.i18n.setDocumentLang(v);
            if (window.initProjectPageNav) await window.initProjectPageNav('cost');
          });
        }
      });
      document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => {
          window.location.href = '/login.html';
        });
      });
      (async function () {
        const lang = window.i18n && window.i18n.getLang ? window.i18n.getLang() : 'tr';
        if (window.i18n && window.i18n.loadDict) {
          await window.i18n.loadDict(lang);
        }
        const sel = document.getElementById('languageSelect');
        if (sel) sel.value = lang;
        if (window.i18n && window.i18n.setDocumentLang) window.i18n.setDocumentLang(lang);
        if (window.i18n && window.i18n.apply) window.i18n.apply(document);
        if (window.initProjectPageNav) {
          await window.initProjectPageNav('cost');
        }
      })();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startProjectCostsPage);
    } else {
      startProjectCostsPage();
    }
  </script>
</body>
</html>
