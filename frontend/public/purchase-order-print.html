<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="purch.print.title">Sipariş formu</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .print-root { max-width: 900px; margin: 0 auto; background: #fff; padding: 24px; }
    @media print {
      body { background: #fff; }
      .no-print { display: none !important; }
      .print-root { box-shadow: none; margin: 0; max-width: 100%; }
    }
    .ph { border-bottom: 2px solid #0f172a; padding-bottom: 12px; margin-bottom: 16px; }
    .pl-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .pl-table th, .pl-table td { border: 1px solid #cbd5e1; padding: 6px 8px; }
    .pl-table th { background: #f1f5f9; }
    .pl-attach { margin-top: 8px; page-break-inside: avoid; }
    .pl-attach img { max-height: 120px; max-width: 200px; }
    .pl-row-cancelled { text-decoration: line-through; opacity: 0.85; background: #fef2f2; }
  </style>
</head>
<body class="app-shell">
  <p class="no-print" style="padding:12px">
    <button type="button" class="logout-btn" id="btnPr" data-i18n="purch.print.btn">Yazdır</button>
    <a href="/purchase-processing.html" class="version-btn" data-i18n="purch.print.back">İşleme dön</a>
  </p>
  <div id="navSlot" class="no-print" style="padding:0 12px 10px;max-width:1200px;margin:0 auto"></div>
  <div class="print-root" id="root"></div>
  <script src="/js/i18n.js?v=15" defer></script>
  <script src="/js/ui-format.js?v=2" defer></script>
  <script src="/js/purchasing-common.js" defer></script>
  <script>
  (function () {
    const id = new URLSearchParams(window.location.search).get('id');
    const tK = (k) => (window.i18n && window.i18n.t) ? window.i18n.t(k) : k;
    function fmtMoney(n) {
      if (window.uiFormat && typeof window.uiFormat.fmtMoney === 'function') {
        return window.uiFormat.fmtMoney(n);
      }
      const x = Number(n);
      return Number.isFinite(x) ? x.toFixed(2) : '0.00';
    }
    function fmtQty(n) {
      if (window.uiFormat && typeof window.uiFormat.fmtQty === 'function') {
        return window.uiFormat.fmtQty(n);
      }
      const x = Number(n);
      return Number.isFinite(x) ? x.toFixed(2) : '0.00';
    }
    function fmtDisplayUpper(v) {
      if (window.uiFormat && typeof window.uiFormat.fmtDisplayUpper === 'function') {
        return window.uiFormat.fmtDisplayUpper(v);
      }
      return String(v == null ? '' : v).toLocaleUpperCase('tr-TR');
    }
    function fmtTitleLabel(v) {
      if (window.uiFormat && typeof window.uiFormat.fmtTitleLabel === 'function') {
        return window.uiFormat.fmtTitleLabel(v);
      }
      const raw = String(v == null ? '' : v).trim();
      if (!raw) return '';
      const lower = raw.toLocaleLowerCase('tr-TR');
      return lower.charAt(0).toLocaleUpperCase('tr-TR') + lower.slice(1);
    }
    function applyTitleCase(root) {
      const target = root || document;
      target.querySelectorAll('title[data-i18n], h1, th, button[data-i18n], a[data-i18n], p[data-i18n]').forEach((el) => {
        if (!el || !el.textContent) return;
        el.textContent = fmtTitleLabel(el.textContent);
      });
    }
    function money(n) {
      return fmtMoney(n);
    }
    async function go() {
      if (!id) {
        document.getElementById('root').innerHTML = '<p>—</p>';
        return;
      }
      const { ok, data } = await purApi('/api/purchasing/orders/' + id);
      if (!ok || !data || !data.ok || !data.order) {
        document.getElementById('root').innerHTML = '<p>' + tK('api.error.unknown') + '</p>';
        return;
      }
      const o = data.order;
      const rows = (o.items || [])
        .map(
          (it) => {
            const cancelled = it.is_line_cancelled || String(it.line_status || '').toLowerCase() === 'cancelled';
            const lineSup = (it.supplier_label || it.line_supplier_name || o.supplier_name || '—').toString().replace(/</g, '');
            const noteCell =
              cancelled && it.cancel_reason
                ? `${tK('purch.proc.cancelReasonPrefix')} ${String(it.cancel_reason).replace(/</g, '')}`
                : '—';
            return `<tr${cancelled ? ' class="pl-row-cancelled"' : ''}>
          <td>${fmtDisplayUpper((it.product_code || '').replace(/</g, ''))}</td>
          <td>${fmtDisplayUpper((it.product_name || '').replace(/</g, ''))}</td>
          <td style="font-size:11px">${fmtDisplayUpper(lineSup)}</td>
          <td style="text-align:right">${fmtQty(it.qty_ordered)}</td>
          <td>${money(it.unit_price)}</td>
          <td style="text-align:right">${money(it.line_total)}</td>
          <td style="font-size:11px">${it.request_line_image_path || it.request_line_pdf_path ? 'â—' : '—'}</td>
          <td style="font-size:11px">${noteCell.replace(/</g, '')}</td>
        </tr>`;
          }
        )
        .join('');
      const atts = (o.items || [])
        .map((it) => {
          const img = it.request_line_image_path;
          const pdf = it.request_line_pdf_path;
          if (!img && !pdf) {
            return '';
          }
          return `<div class="pl-attach"><strong>${fmtDisplayUpper((it.product_code + '').replace(/</g, ''))}</strong>
            ${img ? '<div><img src="' + String(img).replace(/"/g, '') + '" alt="" /></div>' : ''}
            ${pdf ? '<div><a href="' + String(pdf).replace(/"/g, '') + '">PDF</a></div>' : ''}
          </div>`;
        })
        .join('');
      const grand = o.grand_total != null ? money(o.grand_total) : '—';
      document.getElementById('root').innerHTML = `
        <div class="ph">
          <h1 style="margin:0;">${fmtTitleLabel(tK('purch.print.title'))}</h1>
          <p><strong>${fmtDisplayUpper((o.order_code || '').replace(/</g, ''))}</strong> Â· ${fmtDisplayUpper((o.project_label || o.project_code || '—').toString().replace(/</g, ''))}</p>
          <p>${tK('purch.wf.colDate')}: ${(o.order_date || '—').toString().replace(/</g, '')} Â· ${tK('purch.delivery')}: ${(o.delivery_date || '—').toString().replace(/</g, '')}</p>
          <p>${tK('purch.col.supplier')}: ${fmtDisplayUpper((o.supplier_name || '—').replace(/</g, ''))} Â· ${tK('purch.wf.issuer')}: ${fmtDisplayUpper((o.order_creator_name || '—').replace(/</g, ''))}</p>
          <p>${tK('purch.wf.talepNo')}: ${fmtDisplayUpper((o.request_code || o.requester_name ? (o.request_code || '') : '—').replace(/</g, ''))} Â· ${tK('purch.wf.requester')}: ${fmtDisplayUpper((o.requester_name || '—').replace(/</g, ''))} Â· ${tK('purch.wf.approver')}: ${fmtDisplayUpper((o.approver_name || '—').replace(/</g, ''))}</p>
          <p style="font-size:12px;color:#334155">${fmtDisplayUpper((o.note || '').replace(/</g, ''))}</p>
        </div>
        <table class="pl-table">
          <thead>
            <tr>
              <th>${tK('dashboard.colCode')}</th>
              <th>${tK('purch.proc.colProductName')}</th>
              <th>${tK('purch.col.supplier')}</th>
              <th>${tK('purch.gr.colOrderQty')}</th>
              <th>${tK('purch.col.unitPrice')}</th>
              <th>${tK('purch.proc.colLineTotal')}</th>
              <th>${tK('purch.proc.colAttachShort')}</th>
              <th>${tK('common.note')}</th>
            </tr>
          </thead>
          <tbody>${rows || '<tr><td colspan="8">—</td></tr>'}</tbody>
        </table>
        <p style="text-align:right;font-weight:700">${fmtTitleLabel('genel')}: ${grand}</p>
        <div class="pl-atch-wrap">${atts}</div>
        <p style="font-size:11px;margin-top:16px" data-i18n="purch.print.footerHint">Ek ve PDF bu sayfada listelenir.</p>
      `;
      if (window.i18n && window.i18n.apply) {
        window.i18n.apply(document.getElementById('root'));
      }
      applyTitleCase(document.getElementById('root'));
      const ap = new URLSearchParams(window.location.search).get('autoprint');
      if (ap === '1' || ap === 'true') {
        setTimeout(() => {
          if (globalThis.print) {
            globalThis.print();
          }
        }, 450);
      }
    }
    document.getElementById('btnPr').addEventListener('click', () => globalThis.print && globalThis.print());
    (async function () {
      if (window.i18n && window.i18n.loadDict) {
        await window.i18n.loadDict(window.i18n.getLang());
      }
      if (window.loadErpPublicConfig) {
        await loadErpPublicConfig();
      }
      if (window.initPurchasingPageNav) {
        await window.initPurchasingPageNav('proc');
      }
      applyTitleCase(document);
      await go();
    })();
  })();
  </script>
</body>
</html>
