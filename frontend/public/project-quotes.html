<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="project.quotes.pageTitle">Proje fiyat teklifleri</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar dashboard-topbar">
      <div class="topbar-left">
        <h1 data-i18n="project.quotes.pageTitle">Proje fiyat teklifleri</h1>
        <p class="subtitle" data-i18n="project.quotes.sub">Planlanan bölüm</p>
      </div>
      <div class="topbar-right">
        <select id="languageSelect" data-i18n-placeholder="lang.label" aria-label="Language" style="max-width:120px;padding:8px;border-radius:8px" title="Language">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a href="/projects.html" class="version-btn" data-i18n="nav.project.hub">Özet</a>
        <a href="/" class="version-btn" data-i18n="nav.dashboard">Dashboard</a>
        <a href="#" class="logout-btn" id="logoutBtn" data-i18n="nav.logout">Çıkış</a>
      </div>
    </div>
    <div id="globalNavSlot"></div>
    <div id="navSlot"></div>
    <div class="card" style="max-width: 720px">
      <span class="module-tag plan-tag" data-i18n="dashboard.tagPlan">Yakında</span>
      <h2 data-i18n="project.placeholder.title" style="margin-top: 12px">Geliştirme aşamasında</h2>
      <p class="muted" data-i18n="project.quotes.placeholderP">Teklifler, sürümler ve onay akışı; sonraki sürümler.</p>
    </div>
  </div>
  <script src="/js/i18n.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/project-common.js" defer></script>
  <script>
    document.getElementById('languageSelect')?.addEventListener('change', (e) => {
      const v = e.target.value;
      if (v && window.i18n) {
        localStorage.setItem('erp_lang', v);
        window.i18n.loadDict(v).then(() => {
          window.i18n.apply(document);
          if (window.i18n.setDocumentLang) window.i18n.setDocumentLang(v);
        });
      }
    });
    document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
      e.preventDefault();
      fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' }).finally(() => {
        window.location.href = '/login.html';
      });
    });
    (async function start() {
      const lang = window.i18n && window.i18n.getLang ? window.i18n.getLang() : 'tr';
      if (window.i18n && window.i18n.loadDict) {
        await window.i18n.loadDict(lang);
      }
      const sel = document.getElementById('languageSelect');
      if (sel) sel.value = lang;
      if (window.i18n && window.i18n.setDocumentLang) window.i18n.setDocumentLang(lang);
      if (window.i18n && window.i18n.apply) window.i18n.apply(document);
      if (window.initProjectPageNav) {
        await window.initProjectPageNav('quotes');
      }
    })();
  </script>
</body>
</html>
