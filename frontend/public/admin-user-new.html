<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="admin.newUserPageTitle">—</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="app-shell app-master-page app-ui-v3 erp-page admin-user-new-page" data-admin-nav="new-user">
  <div class="container app-layout-v3">
    <div class="app-sidebar">
      <div class="app-sidebar-brand app-master-brand" aria-label="Brand">
        <span class="app-master-logo">AHK</span>
        <strong>Fabrika ERP V2</strong>
      </div>
      <div id="globalNavSlot"></div>
      <aside class="app-master-sidebar">
        <div id="navSlot" class="app-master-subtabs"></div>
      </aside>
    </div>
    <div class="app-main-wrap">
      <header class="topbar dashboard-topbar">
        <div class="topbar-left app-toolbar-left app-toolbar-stack">
        <h1 class="app-page-title erp-page-title" data-i18n="admin.newUserPageHeading">—</h1>
        <p class="subtitle" data-i18n="admin.newUserPageSub">—</p>
      </div>
        <div class="topbar-right app-toolbar-right">
        <select id="languageSelect" aria-label="Language" class="app-select app-topbar-lang">
          <option value="tr">Türkçe</option>
          <option value="uz">O‘zbekcha</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
        <a data-topbar-persist="1" href="/admin.html" class="btn btn-secondary" data-i18n="nav.admin">—</a>
</div>
      </header>
      <div class="app-content">
        <main class="app-master-main">

    <p id="adminErr" class="login-error admin-user-new-err is-hidden"></p>

    <section class="card admin-section erp-card admin-user-new-card">
      <div class="section-header">
        <h3 data-i18n="admin.newUser">—</h3>
        <p data-i18n="admin.newUserSub">—</p>
      </div>
      <form id="formNewUser" class="product-form-grid erp-form erp-form-grid admin-user-new-form">
        <div class="form-field">
          <label for="newUsername" data-i18n="admin.usernameField">—</label>
          <input type="text" id="newUsername" name="username" required autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="newFullname" data-i18n="admin.fullName">—</label>
          <input type="text" id="newFullname" name="full_name" class="input-upper" required />
        </div>
        <div class="form-field">
          <label for="newEmail" data-i18n="admin.email">—</label>
          <input type="email" id="newEmail" name="email" />
        </div>
        <div class="form-field">
          <div class="admin-user-new-account-label" data-i18n="admin.newUser.accountKind">—</div>
          <div class="admin-user-new-account-options">
            <label class="perm-item admin-user-new-account-option">
              <input type="radio" name="newAccountKind" value="system" checked />
              <span data-i18n="admin.newUser.accountKindSystem">—</span>
            </label>
            <label class="perm-item admin-user-new-account-option">
              <input type="radio" name="newAccountKind" value="operational" />
              <span data-i18n="admin.newUser.accountKindOperational">—</span>
            </label>
          </div>
        </div>
        <div class="form-field" id="newUserSystemRow">
          <label for="newRole" data-i18n="admin.newUser.systemRoleLabel">—</label>
          <select id="newRole" name="role_id" required></select>
        </div>
        <div class="form-field" id="newUserEmployeeRow" style="display:none">
          <label for="newEmployee" data-i18n="admin.newUser.employeeCardLabel">—</label>
          <select id="newEmployee" name="employee_id"></select>
        </div>
        <div class="form-field">
          <label for="newPass" data-i18n="admin.user.password">—</label>
          <input type="password" id="newPass" name="password" required minlength="4" autocomplete="new-password" />
        </div>
        <div class="form-field form-actions erp-form-actions">
          <button type="submit" class="btn btn-primary" data-i18n="admin.create">—</button>
        </div>
      </form>
    </section>
      
        </main>
      </div>
    </div>
  </div>
<script src="/js/i18n.js" defer></script>
  <script src="/js/ui-notify.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="/js/admin-common.js" defer></script>
  <script src="/js/admin.js" defer></script>
</body>
</html>
